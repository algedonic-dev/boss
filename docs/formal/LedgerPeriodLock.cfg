(* TLC config — bounded model for `LedgerPeriodLock.tla`.
 *
 * Constants chosen to keep TLC's exhaustive search tractable
 * (under one second on a small machine):
 *   3 accounts (one per kind we balance over)
 *   2 periods
 *   amounts in 0..2
 *   max 3 entries
 *
 * Account-kind partitions are passed as separate sets because the
 * .cfg syntax doesn't support inline function literals.
 *
 * Why this is enough:
 *  - 1 asset + 1 liability + 1 revenue gives the AccountingEquation
 *    invariant something to balance across kinds. Adding more
 *    accounts of the same kind doesn't expose new failure modes
 *    that 1-per-kind doesn't already.
 *  - 2 periods exercise the lock/unlock toggle without exploding
 *    state space combinatorially.
 *  - amount domain {0, 1, 2} is enough to find any algebraic
 *    counterexample TLC could generate (the relevant arithmetic
 *    invariants are linear; small examples find them).
 *  - 3 entries lets every period reach 0/1/2/3 entries and lets
 *    interleavings of post + lock + unlock happen.
 *
 * If the spec evolves (e.g. multi-line entries, FX, closing
 * entries), bump these and re-run. TLC will report state-space
 * size at the end.
 *)

CONSTANTS
    AssetAccounts     = {a1000}
    LiabilityAccounts = {a2200}
    EquityAccounts    = {}
    RevenueAccounts   = {a4100}
    ExpenseAccounts   = {}
    Periods           = {p1, p2}
    MaxAmount         = 2
    MaxEntries        = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    EveryEntryBalanced
    AccountingEquation
    PeriodStatusOK

PROPERTIES
    LockedPeriodImmutable
