(* TLC config — bounded model for `StepStatus.tla`.
 *
 * Three steps with a small but non-trivial blocked_by graph:
 *
 *   s1 — no prereqs (root)
 *   s2 — depends on s1
 *   s3 — depends on s1 AND s2 (chain through s2)
 *
 * Each step's prereq set is passed as its own constant because TLC's
 * .cfg parser doesn't accept inline function literals
 * (`[s1 |-> {}, s2 |-> {s1}]` is illegal here). The .tla file
 * assembles `BlockedBy` from the per-step constants.
 *
 * This shape exercises every property:
 *   - PrereqsBeforeReady fails immediately if any path lets s2
 *     become Ready while s1 is still PendingPrereqs.
 *   - NoSkippingReadyToBegin fails if any action puts a Step
 *     directly from PendingPrereqs into InProgress.
 *   - TerminalNoResurrection fails if any action reads from a
 *     Completed/Aborted source.
 *   - NoCompletionFromOutsideInProgress fails if any path lets
 *     a Step reach Completed without first being InProgress.
 *   - BlockedIsAlternateNotTerminal fails if Blocked is ever
 *     entered from anything other than InProgress, or if a
 *     Blocked Step is left orphaned without an exit transition.
 *
 * State space converges in seconds at this bound.
 *)

CONSTANTS
    Steps      = {s1, s2, s3}
    Prereqs_s1 = {}
    Prereqs_s2 = {s1}
    Prereqs_s3 = {s1, s2}

SPECIFICATION Spec

INVARIANTS
    TypeOK
    TerminalAbsorbing
    NoSkippingReadyToBegin
    PrereqsBeforeReady
    CompletedOnlyFromInProgress
    BlockedRequiresPriorInProgress
