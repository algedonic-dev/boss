[[step_type]]
kind = "trigger"
completion = "auto-on-materialize"
label = "Job Trigger"
category = "coordination"
ux = "inline"
version = 1
description = """
Opening signal — what caused this Job to exist. Periodic action,
rate-based birth, counterparty re-emission, operator click. The
trigger step auto-completes at Job-open time with metadata
capturing the trigger source (e.g. trigger_kind=periodic,
trigger_name=daily-ap-payment). Makes the "how did this Job
start" question visible at the DAG instead of implicit in
audit_log.
"""
typical_duration_hours = 0.0
typical_duration_jitter = 0.0
required_roles = []

  [[step_type.fields]]
  name = "trigger_kind"
  field_type = "periodic|event|operator|counterparty"
  required = false
  description = "How the Job opened — automation, external event, human, or another Job"
  faker_hint = "enum:periodic|event|operator|counterparty"

  [[step_type.fields]]
  name = "trigger_name"
  field_type = "string"
  required = false
  description = "The specific trigger (periodic action name, event topic, operator id, source Job id)"

[[step_type]]
kind = "demand-gate"
label = "Demand Gate"
category = "operations"
ux = "inline"
version = 1
description = """
Decision gate: read finished-goods inventory and decide whether to
run today's production batch. The `outcome` enum (brew | oversupply)
is the fork discriminator the JobKind branches on — declaring it as
an enum rather than free-text lets the viability lint prove the fork
covers every outcome. Used by the brewery morning-brew family.
"""
typical_duration_hours = 0.25
typical_duration_jitter = 0.3
required_roles = ["head-brewer"]
# Agent-executed: the dispatcher reads finished-goods stock and stamps the
# brew/oversupply outcome at computer speed on step.ready, instead of the
# gate waiting on a head-brewer to pull it (which throttled it at warp and
# put a system decision inside the sim). See
# docs/architecture-decisions.md. The role above is retained as
# the human fallback / "who owns this" attribution.
completion = "agent"

  [[step_type.fields]]
  name = "outcome"
  field_type = "brew|oversupply"
  required = true
  description = "Brew-today decision — the outcome the JobKind forks on."
  faker_hint = "enum:brew|oversupply"

[[step_type]]
kind = "availability-gate"
label = "Availability Gate"
category = "operations"
ux = "inline"
version = 1
description = """
Decision gate: read finished-goods inventory and decide whether an order
can be fulfilled from stock now (fulfill) or must be backordered
(backorder). The `outcome` enum is the fork discriminator the JobKind
branches on. Agent-executed — the dispatcher reads real stock and stamps
the outcome at computer speed on step.ready, no human in the loop. See
docs/architecture-decisions.md.
"""
typical_duration_hours = 0.0
typical_duration_jitter = 0.0
required_roles = []
completion = "agent"

  [[step_type.fields]]
  name = "outcome"
  field_type = "fulfill|backorder"
  required = true
  description = "Fulfillment decision the JobKind forks on."
  faker_hint = "enum:fulfill|backorder"

  [[step_type.fields]]
  name = "line_items"
  field_type = "array"
  required = false
  description = "Order lines (sku + qty) checked against finished-goods stock."

[[step_type]]
kind = "outcome"
label = "Job Outcome"
category = "coordination"
ux = "inline"
version = 1
description = """
Terminal node — the JobKind's possible end states. Each `outcome`
step represents one legal closure shape (completed, aborted,
skipped, withdrawn). Exactly one outcome step lands Completed per
Job; siblings are Aborted by the engine when the chosen outcome
fires. Makes "how did this Job end" visible at the DAG instead
of inferred from job.status alone.
"""
typical_duration_hours = 0.0
typical_duration_jitter = 0.0
required_roles = []

  [[step_type.fields]]
  name = "outcome_kind"
  field_type = "completed|skipped|aborted|withdrawn"
  required = false
  description = "Which terminal state this outcome represents"
  faker_hint = "enum:completed|skipped|aborted|withdrawn"

  [[step_type.fields]]
  name = "milestone_name"
  field_type = "string"
  required = false
  description = "Name of the milestone"

  [[step_type.fields]]
  name = "criteria"
  field_type = "string"
  required = false
  description = "Completion criteria"

