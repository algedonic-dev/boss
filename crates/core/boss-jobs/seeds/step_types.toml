  # `bill_category` routes the GL debit via bill_accounts.toml; the credit is
  # always 2100 A/P. Drives the `ledger.bill.approve` dispatcher handler
  # (POST /api/ledger/bills). Adding a new kind of spend is a JobKind writing
  # a `bill_category` + a bill_accounts.toml row — zero code.
