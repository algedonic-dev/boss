[[step_type]]
kind = "job-kind-publish"
label = "Publish JobKind"
category = "admin"
ux = "inline"
version = 1
description = "Publish a JobKindSpec into the registry. Terminal step of `job-kind-design` Jobs."
typical_duration_hours = 0.05
typical_duration_jitter = 0.0
required_roles = ["it-director", "platform-admin"]

  [[step_type.fields]]
  name = "job_kind_spec"
  field_type = "object"
  required = true
  description = "Full JobKindSpec blob to publish"

  [[step_type.fields]]
  name = "previous_kind_version"
  field_type = "integer"
  required = false
  description = "If set, supersedes this prior active version"

[[step_type]]
kind = "order-intake"
label = "Order Intake"
category = "coordination"
ux = "expanded"
version = 1
description = "Open a sales-order Job and confirm its line items, delivery window, and customer-facing terms. The brewery + DTC-shop counterpart to the device-shop's physical-unit `intake` step — no `asset_id` because there's no physical asset being received, just an order being opened."
typical_duration_hours = 0.5
typical_duration_jitter = 0.4
required_roles = ["sales-rep", "bookkeeper"]
# Agent-executed: confirming an order from a feed/system is computer-speed
# automation, not human labor. The dispatcher auto-completes it on
# step.ready so high-volume order flow (wholesale 48/day) doesn't queue
# behind the human workforce. See docs/architecture-decisions.md.
completion = "agent"

  [[step_type.fields]]
  name = "line_items"
  field_type = "array"
  required = false
  description = "Per-SKU lines: [{sku, qty, unit_price_cents, description}]"

  [[step_type.fields]]
  name = "delivery_window"
  field_type = "string"
  required = false
  description = "Operator-supplied delivery window (e.g., 'Mon-Wed afternoon')"

  [[step_type.fields]]
  name = "po_number"
  field_type = "string"
  required = false
  description = "Customer-supplied PO reference (optional)"

  [[step_type.fields]]
  name = "notes"
  field_type = "string"
  required = false
  description = "Free-text intake notes"

[[step_type]]
kind = "review-design"
label = "Review Design"
category = "coordination"
ux = "expanded"
version = 1
description = """
Custom Step UX for the `design-doc-review` JobKind. The plugin
fetches `/api/design/docs/{doc_path}`, lists every `### Qn:` open
question parsed by boss-docs-api, and renders a per-question
resolution textarea. Step completion is gated on every question
having a non-empty resolution recorded. Resolutions are saved as
pending-decisions via `/api/design/pending-decisions`; the
follow-up `/api/design/flush-jobs` writes them into the source
doc's Decision-history section (each release, settled material
folds into `docs/architecture-decisions.md` and the source doc is
deleted).
"""
typical_duration_hours = 4.0
typical_duration_jitter = 0.5
required_roles = ["platform-admin"]

  [[step_type.fields]]
  name = "doc_path"
  field_type = "string"
  required = true
  description = "Path to the design doc, e.g. docs/design/class-registry.md"

  [[step_type.fields]]
  name = "resolutions"
  field_type = "array"
  required = false
  description = "Per-question resolutions [{anchor, decision}]; plugin enforces all-filled before done"

