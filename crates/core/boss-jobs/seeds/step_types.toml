# Step type catalog — the v1 alphabet of legal Step transitions.
#
# `boss_jobs::step_registry::StepRegistry::v1()` reads this file at
# startup, deserializes the `[[step_type]]` blocks into StepType
# rows, leaks the strings to `'static` (one-time, process-lifetime
# leak), and caches them in a `OnceLock<Vec<StepType>>`.
#
# Adding a new step kind: append a `[[step_type]]` block here, then
# rebuild + restart. No Rust changes required for the registry
# itself — but new kinds whose completion should fire downstream
# side effects need a matching dispatcher Handler registered in
# `boss-dispatcher::rules::handlers::*` + a rule row in
# `infra/dispatcher/rules.toml` listening on `step.done.<kind>`.
#
# Schema: see `crates/core/boss-jobs/src/step_registry.rs` —
# `LoadedStepType` (the private serde mirror of `StepType`) and
# `StepType` itself.
#
# Two contracts hold across every block:
#
#  - **Required-at-done, not required-at-create.** A field's
#    `required = true` means the validator rejects the step
#    flipping to `done` without it; the step can still exist on
#    a Job with that field empty.
#
#  - **Pipe-shaped `field_type` strings must carry a `faker_hint`
#    of the form `enum:a|b|c`.** Without it the sim's faker emits
#    a generic string the validator rejects with 400. The lint
#    `every_pipe_shaped_type_has_an_enum_faker_hint` enforces this.

# =============================================================
# Coordination
# =============================================================

[[step_type]]
kind = "sign-off"
surface = "approval"
label = "Sign-off"
category = "coordination"
ux = "inline"
version = 1
description = "Authority agreement on a step in its current shape — approve/reject decisions and regulatory sign-offs. Stamps are collected via POST .../sign-offs; who must stamp is the step's sign_offs_required, policy decides who may."
typical_duration_hours = 0.5
typical_duration_jitter = 0.3
required_roles = ["qa-supervisor", "service-mgr", "controller", "production-lead", "head-brewer"]

  # The old per-metadata sign-off relics (authority_role / signed_by /
  # signed_at) are gone: requirements live on the step
  # (sign_offs_required) and attestations are stamps. The decision
  # trio absorbed from the retired `approval` kind stays metadata —
  # it is the CONTENT being agreed to, not the agreement itself.
  [[step_type.fields]]
  name = "decision"
  field_type = "pending|approved|rejected|changes-requested"
  required = false
  description = "The decision this sign-off records"
  faker_hint = "enum:pending|approved|rejected|changes-requested"

  [[step_type.fields]]
  name = "decided_at"
  field_type = "date-time"
  required = false
  description = "When the decision was made"

  [[step_type.fields]]
  name = "comment"
  field_type = "string"
  required = false
  description = "Reviewer comment"

  [[step_type.fields]]
  name = "threshold_cents"
  field_type = "integer"
  required = false
  description = "Cents threshold triggering this approval"

  [[step_type.fields]]
  name = "currency"
  field_type = "string"
  required = false
  description = "ISO-4217 currency for the threshold (default USD)"

  [[step_type.fields]]
  name = "certificate_id"
  field_type = "string"
  required = false
  description = "Certificate or document reference"

  [[step_type.fields]]
  name = "regulatory_context"
  field_type = "string"
  required = false
  description = "FDA, ISO, or other standard"

[[step_type]]
kind = "delegate-subjob"
completion = "child-job"
label = "Delegate Sub-job"
category = "coordination"
ux = "inline"
version = 1
description = """
Delegation fork (JobKind v2 / D7): when this step becomes Ready it
spawns a child Job of `subjob_kind` and pauses; when that child Job
hits a terminal outcome the dispatcher writes the outcome back into
`subjob_outcome` and flips this step to Completed. The structural
parent-step → child-Job link rides on `Step.embedded_job`; the
reverse link rides on the child Job's `metadata.parent_step_id`.
Unlike the v1 `sub-job` step (a passive pointer an operator fills in),
`delegate-subjob` is the active D6/D7 mechanism the dispatcher drives
end-to-end — spawn on `step.ready.delegate-subjob`, resolve on the
child's `jobs.job.closed`.
"""
typical_duration_jitter = 0.3
required_roles = []

  [[step_type.fields]]
  name = "subjob_kind"
  field_type = "string"
  required = true
  description = "Which child JobKind to spawn when this step becomes Ready"

  [[step_type.fields]]
  name = "subjob_outcome"
  field_type = "string"
  required = false
  description = "Terminal outcome of the spawned child Job, written back by the dispatcher on close"

