[package]
name = "boss-brewery-engine"
description = "Brewery operating-engine binary. Loads the brewery seed bundle, registers every bridge crate's default SideEffectHandlers, and drives the day-loop via run_days — the production wire-up that flips the protocol-proofs from `tested` to `running`. See docs/design/correctness-protocol.md."
version.workspace = true
edition.workspace = true

[[bin]]
name = "boss-brewery-data-seed"
path = "src/bin/boss_brewery_data_seed.rs"

[[bin]]
name = "boss-brewery-sim"
path = "src/bin/boss_brewery_sim.rs"

[features]
default = []

[dependencies]
boss-ports = { path = "../../core/boss-ports" }
anyhow = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
# Control + telemetry HTTP server for the live daemon (GET /telemetry,
# GET/POST /config) — boss-simulator proxies to it on localhost.
axum = { workspace = true }

boss-accounts = { path = "../../modules/boss-accounts" }
boss-inventory = { path = "../../modules/boss-inventory" }
boss-jobs = { path = "../../core/boss-jobs" }
# Policy-rule seeding for the converged prepare step reuses
# boss_policy::bootstrap::publish_policy_rules (the same impl the
# boss-policy-bootstrap binary drives). default-features=false keeps
# the postgres adapter out — prepare is a pure public-API client.
boss-policy = { path = "../../core/boss-policy", default-features = false }
boss-sim = { path = "../../orchestrators/boss-sim" }
# Core type for business-calendar DATA passed into the engine.
boss-core = { path = "../../core/boss-core" }
# HTTP client port — the daemon fetches business calendars from
# boss-calendar (one source of truth) instead of hardcoding holidays.
boss-calendar-client = { path = "../../core/boss-calendar-client" }

# NOTE: this crate (incl. the boss-brewery-sim daemon) is deliberately a
# pure public-API client — it has NO database or message-bus dependency
# (no sqlx, no boss-nats, no `postgres` adapter feature on its boss-*
# deps). The simulator only ever touches the system through the public
# HTTP API. infra/lint/sim-boundary-audit.sh enforces this.

[dev-dependencies]

[lints]
workspace = true
