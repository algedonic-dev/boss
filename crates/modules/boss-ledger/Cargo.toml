[package]
name = "boss-ledger"
description = "General ledger: chart of accounts + posting rules + journal projection over financial_facts"
version.workspace = true
edition.workspace = true

[[bin]]
name = "boss-ledger-api"
path = "src/bin/boss_ledger_api.rs"
required-features = ["postgres"]

[[bin]]
name = "boss-ledger-recognize"
path = "src/bin/boss_ledger_recognize.rs"
required-features = ["postgres"]

[[bin]]
name = "boss-ledger-replay-check"
path = "src/bin/boss_ledger_replay_check.rs"
required-features = ["postgres"]

[[bin]]
name = "boss-ledger-facts-rebuild"
path = "src/bin/boss_ledger_facts_rebuild.rs"
required-features = ["postgres"]

[features]
default = []
postgres = ["dep:sqlx", "boss-events/postgres"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
toml = { workspace = true }
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "postgres", "chrono", "json", "rust_decimal", "uuid"], optional = true }
rust_decimal = { version = "1", features = ["serde"] }
sha2 = "0.11"
hex = "0.4"
boss-core = { path = "../../core/boss-core" }
boss-clock-client = { path = "../../core/boss-clock-client" }
boss-ports = { path = "../../core/boss-ports" }
boss-classes-client = { path = "../../core/boss-classes-client" }
boss-events = { path = "../../core/boss-events" }
boss-nats = { path = "../../core/boss-nats" }
boss-policy = { path = "../../core/boss-policy" }
boss-policy-client = { path = "../../core/boss-policy-client" }

[dev-dependencies]
tokio = { workspace = true }
tower = { workspace = true }
http-body-util = "0.1"
boss-testing = { path = "../../core/boss-testing", features = ["postgres"] }
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "postgres", "chrono", "json", "rust_decimal", "uuid"] }
# (cross-crate batch contract dev-deps retired 2026-05-06
# alongside the BatchEngine rip — the upstream emitters that
# the contract tests pinned no longer exist)

[lints]
workspace = true
