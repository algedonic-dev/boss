[package]
name = "boss-simulator"
description = "Simulator UX service: hosts the /simulator SPA + sim control/status API"
version.workspace = true
edition.workspace = true

[[bin]]
name = "boss-simulator"
path = "src/bin/boss_simulator.rs"

[dependencies]
boss-ports = { path = "../../core/boss-ports" }
boss-policy-client = { path = "../../core/boss-policy-client" }
axum = { workspace = true }
tokio = { workspace = true }
tower-http = { version = "0.7", features = ["fs", "trace"] }
# Only localhost HTTP calls to clock-api + jobs-api — no TLS backend needed.
reqwest = { version = "0.13", default-features = false, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

[lints]
workspace = true
