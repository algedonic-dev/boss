[package]
name = "boss-sim"
description = "Shape-driven simulation engine — Periodic + Counterparty + Batch primitives, side-effect dispatch, output adapters. Tenants compose these via per-tenant engine crates (boss-brewery-engine, boss-used-device-shop-engine)."
version.workspace = true
edition.workspace = true

# Legacy CLI + generator chain retired 2026-05-03 (step 9b of the
# HumanWorker generator retirement). Tenant-specific engine crates
# own the entry-point shape now.

[features]
default = ["http"]
http = ["dep:reqwest"]

[dependencies]
boss-ports = { path = "../../core/boss-ports" }
boss-assets = { path = "../../modules/boss-assets" }
boss-catalog = { path = "../../modules/boss-catalog" }
boss-commerce = { path = "../../modules/boss-commerce" }
boss-shipping = { path = "../../modules/boss-shipping" }
boss-jobs = { path = "../../core/boss-jobs" }
# boss-core is now a required dep: ActorId flows through every
# generator (invariant I-2 — every transition has a named CPU).
boss-core = { path = "../../core/boss-core" }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
toml = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"], optional = true }

[dev-dependencies]
# Brewery / UDS batch dev-deps retired 2026-05-06 alongside the
# BatchEngine rip (TODO.md "Strip BatchEngine"). The brewery_e2e
# integration test that wired `[batch.*]` tenant.toml rows is
# being rewritten to use the `[periodic.*]` + JobKind path that
# replaces it.

[lints]
workspace = true
