# Boss Demo State Configuration
#
# This is THE script that produces the demo state. Run:
#
#   boss-sim bootstrap --config data/demo.toml
#   boss-sim replay --config data/demo.toml --api-url http://127.0.0.1:4443
#
# The seed is deterministic — same config always produces same output.
# Data files are relative to the working directory (repo root).

catalog_path = "examples/used-device-shop/data/catalog.json"
employees_path = "examples/used-device-shop/data/employees.json"

seed = 0xcafebabe
start_date = "2018-04-11"
end_date = "2026-04-09"
intake_rate = 20.0
sales_match_rate = 0.08
failure_rate_multiplier = 1.0
ticket_close_rate = 0.12
decommission_rate = 0.0003
parts_block_probability = 0.08
anomalies = true
account_count = 2500
new_device_ratio = 0.15

[[intake_rate_ramp]]
date = "2018-04-11"
rate = 20.0

[[intake_rate_ramp]]
date = "2020-04-10"
rate = 50.0

[[intake_rate_ramp]]
date = "2022-04-10"
rate = 90.0

[[intake_rate_ramp]]
date = "2024-04-10"
rate = 120.0

[refurb_stage_days]
intake = 2
triage = 3
refurb = 10
qa = 4
ready = 15
