# Boss 12-month demo configuration
#
# Scoped-down variant of demo.toml: one year of events instead of
# eight, and the account + intake-rate knobs dialled back so the
# resulting state reflects a realistic mid-size used-device
# refurbishment business rather than the 4x-overblown default.
#
# Produces ~3,000 tracked systems and ~300 accounts with every
# entity linked through the full lifecycle (system → sale →
# shipment → account → service → revenue).
#
#   sudo ./infra/postgres/bootstrap-db.sh boss
#   boss-sim replay --live --config crates/boss-sim/data/demo-12m.toml \
#                  --api-url http://127.0.0.1:4443

catalog_path = "examples/used-device-shop/data/catalog.json"
employees_path = "examples/used-device-shop/data/employees.json"

seed = 0xcafebabe
# 12-month window ending at "today" so dashboards show recent
# activity on load, not activity from eight years ago.
start_date = "2025-04-22"
end_date = "2026-04-22"
# Single flat rate — 8 systems/day × 365 = ~2,920 tracked systems
# over the year. Real Boss operates at this scale.
intake_rate = 8.0
sales_match_rate = 0.08
failure_rate_multiplier = 1.0
ticket_close_rate = 0.12
decommission_rate = 0.0003
parts_block_probability = 0.08
anomalies = true
# 300 accounts matches Boss's installed-base order of magnitude.
# The previous 2,500-account default produced ~10x too many
# customers relative to real operations.
account_count = 300
new_device_ratio = 0.15

# No intake ramp — the 12-month window is short enough that a
# steady rate produces believable data without staging growth.

[refurb_stage_days]
intake = 2
triage = 3
refurb = 10
qa = 4
ready = 15
