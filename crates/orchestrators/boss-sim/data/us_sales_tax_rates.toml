# US state sales-tax rates — rate in basis points (100 bps = 1.00%).
# Loaded by `tax_rates::rate_for_state` via include_str!. Mirrors the
# `sales_tax_rate_by_state` seed in `infra/postgres/schema/40-ledger.sql`.
#
# CANONICAL: this file is the source of truth. The SQL seed is a
# downstream copy used by services that don't link boss-sim. If they
# drift, this file wins. A follow-up should generate the SQL inserts
# from this TOML at bootstrap time (post-OSS-launch).
#
# Rates as of 2025 — combined state + average local. Update annually.
# Zero-tax states (OR/NH/MT/DE/AK) still get a jurisdiction string so a
# future rate change (or a municipal add-on) picks up cleanly.

