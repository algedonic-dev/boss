# Smoke-test config for the scratch stack.
#
# The goal of this config is narrow: exercise every operating motion
# in the sim at least once so a full nuke-and-replay is a meaningful
# end-to-end check of the service stack. It is NOT tuned for realism
# — rates and thresholds are bumped so the full device lifecycle
# (intake → refurb → sale → install → service → work order → invoice
# → PO reorder → vendor invoice → decommission) fits in ~45 days.
#
# Pair this with `infra/verify-smoke.sh` which asserts ≥1 row per
# operating motion after the run. If any motion shows zero rows the
# smoke is considered broken.

catalog_path = "examples/used-device-shop/data/catalog.json"
employees_path = "examples/used-device-shop/data/employees.json"

seed = 0xcafebabe
start_date = "2026-01-01"
# 45 days — long enough for opportunity advancement (15-25d) plus
# ship/install/ticket/work-order tails. Anything shorter misses
# invoices/work_orders/vendor_invoices.
end_date = "2026-02-14"

# Higher than the original (5.0) so the refurb pipeline has enough
# throughput to produce ready_devices before sales tries to match.
intake_rate = 8.0

# Bumped from 0.08 so early opportunities don't all bounce off an
# empty ready_devices pool in the first week.
sales_match_rate = 0.35

# Bumped from 1.0 — the failure rate is annualised, so with only a
# handful of installed devices at peak and a ~45-day window, the
# expected ticket count at 1.0× is well under 1. 40× gives the
# service → work_order chain a realistic shot at firing once.
failure_rate_multiplier = 40.0

# Bumped from 0.12 so tickets close within the window and trigger
# the work_order-completed / invoice path.
ticket_close_rate = 0.3

# Decommission requires a non-zero rate AND eligible devices. With
# `decommission_min_age_days = 0` below, every installed device
# is eligible, so a 0.02 rate produces ~1 decommission/day once
# any devices are installed.
decommission_rate = 0.02
decommission_min_age_days = 0

# 0.2 so the parts-block path fires on at least one refurb job.
parts_block_probability = 0.2

# Shrink the bootstrap inventory quantities so a handful of refurb
# part replacements crosses the reorder threshold. Scales on_hand,
# reorder_point, reorder_qty, and trailing usage uniformly; both
# the replay seed path and the PO generator's estimation use the
# same scaled values.
inventory_seed_scale = 0.1

# Enable the anomaly generator (past-due invoices, vendor back-
# orders, etc). Default smoke had this off which skipped the motion.
anomalies = true

# 30 accounts (up from 10) so support-case Bernoulli per account
# produces at least one case in 45 days and there's enough device
# surface area for tickets to land on installed fleet.
account_count = 30

new_device_ratio = 0.2

[refurb_stage_days]
intake = 1
triage = 1
refurb = 2
qa = 1
ready = 1
