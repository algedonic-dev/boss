[package]
name = "boss-cli"
description = "Boss operator + developer CLI"
version.workspace = true
edition.workspace = true

[[bin]]
name = "boss"
path = "src/main.rs"

[dependencies]
boss-core = { path = "../../core/boss-core" }
boss-ports = { path = "../../core/boss-ports" }
boss-events = { path = "../../core/boss-events" }
boss-nats = { path = "../../core/boss-nats" }
boss-assets = { path = "../../modules/boss-assets", features = ["postgres"] }
boss-ledger = { path = "../../modules/boss-ledger", features = ["postgres"] }
sqlx = { version = "0.8", default-features = false, features = ["macros", "runtime-tokio", "postgres"] }
clap = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
dirs = "6"
chrono = { workspace = true }
uuid = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

[lints]
workspace = true
