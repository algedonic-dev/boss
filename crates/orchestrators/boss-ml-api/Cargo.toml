[package]
name = "boss-ml-api"
description = "boss-ml HTTP service binary — wires the boss-ml library + the canonical plugin set (boss-ml-plugins) into a runnable axum server."
version.workspace = true
edition.workspace = true

[[bin]]
name = "boss-ml-api"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
axum = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
sqlx = { version = "0.9", default-features = false, features = ["macros", "runtime-tokio", "postgres", "chrono", "json", "uuid"] }

boss-core = { path = "../../core/boss-core" }
boss-ml = { path = "../../core/boss-ml", features = ["postgres"] }
boss-ml-plugins = { path = "../../modules/boss-ml-plugins" }
boss-clock-client = { path = "../../core/boss-clock-client" }
boss-ports = { path = "../../core/boss-ports" }

[lints]
workspace = true
