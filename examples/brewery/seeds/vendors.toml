# Brewery vendor fixtures — 40 vendors covering the full
# procurement footprint of an industrial-scale brewery, each
# tagged with a category for inventory + finance reporting.
# Loaded by the brewery prepare step (`boss-brewery-sim prepare`),
# POSTed through the public API.
#
# Categories grouped:
#   hops (4)        — multiple sourcing for redundancy + variety
#   grain/malt (5)  — base malt + specialty + adjuncts
#   yeast (3)       — production strains + lab cultures
#   packaging (8)   — bottles, cans, kegs, crowns, labels, cartons,
#                     stretch wrap, six-pack carriers
#   sanitation (3)  — caustic + acid + lab chemicals
#   logistics (4)   — freight, last-mile couriers, kegs-out
#   equipment (4)   — process tanks, packaging line service,
#                     fittings, pumps
#   utilities (3)   — CO2, nitrogen, water treatment
#   prof-services (4) — legal, accounting, IT integrations, lab
#   misc (2)        — uniforms, marketing/print

# Schema CHECK on vendors.payment_terms gates this list. Top-level
# keys must precede the `[[vendor]]` array-of-tables below — TOML
# scope rules apply.
payment_terms = ["net-30", "net-45", "net-60", "prepaid"]

