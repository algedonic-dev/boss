# Brewery parts catalog — initial inventory state.
#
# Every SKU referenced by a JobKind's consume_parts list lives
# here. The brewery prepare step (`boss-brewery-sim prepare`)
# POSTs these to
# `/api/inventory/items/batch` before the day loop starts, so
# step-effects-runner consume calls succeed against real rows
# instead of 404'ing. Stock levels are sized for the 12-month
# seed run: every SKU starts mid-cycle — reorder_point plus about
# half a reorder_qty — so the first demand-driven restock fires
# partway through the run (exercising the procurement→receive→bill
# loop) without a cold-start stockout.
#
# Bin coordinates are illustrative — A/B/C cold-storage,
# D/E ambient. Reorder point is ~73-78% of trailing-90-day usage
# (≈ 66-70 sim-days of cover) and reorder qty is ~90 days' worth.
# The deep buffer is deliberate: under a compressed regen the
# demand-driven per-SKU restock is workforce-driven and takes
# ~2-3 sim-weeks to flow procurement → receive → put-away, so the
# reorder point must cover that lead time plus bursty packaging
# draws. (Earlier ~20%-of-usage points sat right at the lead time
# → production 409'd on insufficient stock under load.)
#
# Each reorder point carries an explicit ~2-week safety buffer on
# top of lead-time cover, sized off the SKU's own demand signal as
# `+ round(trailing_90d_usage × 14/90)` (14 sim-days out of the
# 90-day usage window) — derived from real demand, not a literal.
# Why 2 weeks: a prior 365-day regen ran a net raw-material deficit
# of ~$162K (~1.7% of ~$9.86M consumed — under one week of total
# raw burn), so the saw-tooth trough dipped just below zero for the
# busiest SKUs around demand peaks and account 1300 / `on_hand`
# went briefly negative. Two weeks of stock lifts the trough back
# above zero with margin for the July surge without over-stocking:
# `reorder_qty` (PO size) and `on_hand` (opening 1300 balance) are
# untouched — restocks just fire ~2 weeks earlier, so this is
# balance-neutral cash↔inventory, no COGS/margin change.

# `avg_cost_cents` seeds the weighted moving-average that
# `inventory_items` tracks per SKU. Values reflect ~industrial
# craft-brewery procurement (USD wholesale, 2025):
#   - 50-lb malt sack: $25-30
#   - 44-lb hops pellet box: $300 (Cascade specialty)
#   - 1L liquid yeast pitch: $15
#   - 50-lb CO2 cylinder: $25
# Recognize at consumption time via PartsConsumeEmitter →
# finance.cogs.recognized → DR 5100 / CR 1300. Labor + overhead
# stay in 6xxx OPEX; ingredient COGS is only ingredients.

[[parts]]
part_sku = "ING-MALT-2ROW-50"
vendor_category = "grain-supplier"
bin = "D-01-01"
on_hand = 31000
allocated = 0
# 17000 lead-time cover + ~2wk safety (29000 × 14/90 ≈ 4500) = 21500.
reorder_point = 21500
reorder_qty = 29000
trailing_90d_usage = 29000
avg_cost_cents = 2500
vendor_price_cents = 2500

