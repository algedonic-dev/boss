# ---------------------------------------------------------------------------
# Packaging materials. The kegs themselves are reused assets (CIP-
# cleaned + refilled, not consumed each brew), so we model the
# per-fill packaging cost as a bundle SKU: sanitizer + labels +
# minor consumables per keg. Pricing is the per-fill cost a real
# brewery sees:
#   - PKG-KEG-FILL-HALF-BBL: ~$3/fill (labels $0.10, sanitizer
#     $0.50, lubricant $0.05, dust cover $0.10, amortized keg
#     wear $2.25 = roughly $3 cash + capital cost basis)
#   - PKG-KEG-FILL-SIXTEL:   ~$1.20/fill (proportionally smaller)
# Sized for daily brewing burn: 1.2 brews/day × 525 kegs/brew ≈
# 630 keg-fills/day, split across half-BBL + sixtel by ratio
# 210:315 ≈ 40%/60%. So daily burn ≈ 250 half-BBL fills + 380
# sixtel fills; 90-day usage ≈ 22,500 / 34,200.
# ---------------------------------------------------------------------------

[[parts]]
part_sku = "PKG-KEG-FILL-HALF-BBL"
vendor_category = "packaging"
bin = "E-02-01"
on_hand = 25000
allocated = 0
# 13500 lead-time cover + ~2wk safety (22500 × 14/90 = 3500) = 17000.
reorder_point = 17000
reorder_qty = 22500
trailing_90d_usage = 22500
avg_cost_cents = 300
vendor_price_cents = 300

[[parts]]
part_sku = "PKG-KEG-FILL-SIXTEL"
vendor_category = "packaging"
bin = "E-02-02"
on_hand = 37000
allocated = 0
# 20000 lead-time cover + ~2wk safety (34200 × 14/90 ≈ 5300) = 25300 → 25000.
reorder_point = 25000
reorder_qty = 34200
trailing_90d_usage = 34200
