# ---------------------------------------------------------------------------
# Vendor categories — brewery-specific supplier kinds.
#
# Supplier categories carry a `behavior_template` in metadata: the hand-set
# expectation of how a vendor of this kind behaves (procurement lead time,
# fulfilment reliability, AP-payment timing). The simulator stamps each new
# vendor's per-actor `behavior` from its category template at birth (marked
# hand-set), then drives that vendor's supply chain from it — replacing the
# hand-authored `[counterparty.*]` specs. Over time a vendor's profile
# becomes data-derived from its real performance. See
# docs/design/actor-behavior-model.md + boss_inventory::types::VendorBehavior.
# ---------------------------------------------------------------------------

[[class]]
subject_kind = "vendor"
member_attribute = "category"
code = "grain-supplier"
display_name = "Grain / Malthouse"
metadata = { behavior_template = { lead_time_days = 3.0, lead_spread_days = 1.5, fulfilment_rate = 0.98, ap_payment_days = 5.0, ap_spread_days = 2.0 } }
sort_order = 10

