# Class registry seeds for Boss Brewery.
#
# Each [[class]] block is one row of the `classes` table. Schema:
#   subject_kind     — which Subject the Class taxonomies (employee,
#                      location, vendor, etc.)
#   code             — kebab-case slug, unique within (subject_kind,
#                      member_attribute)
#   display_name     — human label
#   member_attribute — which field on the Subject this taxonomy
#                      governs (role / department / kind / etc.)
#   metadata         — optional jsonb, used for cross-cutting flags
#                      (e.g. is_management for roles)
#   sort_order       — display order in admin pickers
#
# Brewery roles + departments deliberately collide with no
# used-device-shop roles — every JobKind step authority_role on the
# brewery side resolves only against brewery-shaped employees.
# Adding a tenant_id column is the cleaner long-term fix; v0 lives
# with the global namespace under the assumption that one DB hosts
# one tenant.

