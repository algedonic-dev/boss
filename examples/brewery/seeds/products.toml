# Brewery finished-product catalog.
#
# Sibling to parts.toml (raw inputs); this file enumerates the
# OUTPUT goods Algedonic Ales produces and sells. Loaded by the
# brewery prepare step (`boss-brewery-sim prepare`) via POST
# /api/products/batch, which lands these as state events; the
# rebuilder reproduces the catalog deterministically from
# products.product.upserted on replay.
#
# package_unit values are tenant-defined and validated against
# the Class registry's (subject_kind='product', member_attribute=
# 'package_unit') rows — the brewery currently uses
# 1/2-bbl-keg, 1/6-bbl-keg, 12oz-case.
#
# Initial on-hand at the brewhouse cooler is wired separately
# via finished_product_inventory POSTs so a fresh deploy renders
# stock without waiting for the first morning-brew Job to
# complete its packaging step.

