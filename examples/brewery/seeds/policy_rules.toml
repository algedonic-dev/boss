# Algedonic Ales — tenant policy seed.
#
# Tenant role grants for the brewery. Core ships only platform
# rules (platform-admin / audit-readonly / smoke-tester / guest);
# this file restores the rest of the brewery's org chart's
# row-level access matrix.
#
# Seeded at first boot by `boss-policy-bootstrap --seeds
# examples/brewery/seeds/policy_rules.toml`. Re-runs are no-ops
# unless `--force` is passed.
#
# Scope vocabulary (from `crate::types::Scope`):
#   - "all"                     no restriction
#   - "self"                    rows the caller owns directly
#   - "team"                    caller + their direct reports
#   - "territory"               accounts on the caller's account team
#   - "department:<name>"       rows scoped to a named department
#
# Department names follow the brewery's `classes.toml` department
# slugs: executive / brewhouse / packaging / cellar / lab /
# warehouse / distribution / taproom / sales / marketing / hr /
# finance / it / maintenance.

# ------------------------------------------------------------------
# Executives — broad Read across every resource.
# ------------------------------------------------------------------

[[grants]]
roles = ["ceo", "coo", "cfo", "cto"]
resources = [
    "job", "step", "account", "employee", "invoice", "agreement",
    "shipment", "part", "purchase-order", "policy-rule",
    "job-kind", "step-plugin",
]
action = "read"
scope = "all"

# CEO + COO can tune policy.
[[grants]]
roles = ["ceo", "coo"]
resource = "policy-rule"
actions = ["create", "update", "delete"]
scope = "all"

# CEO + COO + CTO get override authority on Jobs + Steps.
[[grants]]
roles = ["ceo", "coo", "cto"]
resources = ["job"]
actions = ["update", "close"]
scope = "all"

[[grants]]
roles = ["ceo", "coo", "cto"]
resources = ["step"]
actions = ["update", "sign-off"]
scope = "all"

# CEO + COO + CFO can create + update accounts / invoices / agreements.
[[grants]]
roles = ["ceo", "coo", "cfo"]
resources = ["account", "invoice", "agreement"]
actions = ["create", "update"]
scope = "all"

# CEO + COO can onboard + restructure employees. No delete —
# terminations flip status, never remove rows.
[[grants]]
roles = ["ceo", "coo"]
resource = "employee"
actions = ["create", "update"]
scope = "all"

# CEO + CTO can publish + retire JobKinds and StepPlugins.
[[grants]]
roles = ["ceo", "cto"]
resources = ["job-kind", "step-plugin"]
actions = ["create", "update", "publish", "retire"]
scope = "all"

