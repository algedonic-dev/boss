# ------------------------------------------------------------------
# Step sign-off authority (step-signoff:<role>).
#
# A sign-off step's required role (`authority_role`) is enforced
# through policy by authorizing against a role-scoped resource —
# `step-signoff:<role>` — rather than a bare `step` (see
# `boss-jobs::http::update_step`). Each role here is granted SignOff
# only on ITS OWN `step-signoff:<role>` resource, so a caller can
# sign a step iff their role matches the step's required authority.
# The required role is read from the step's immutable persisted
# metadata, so a PUT body cannot lower the bar.
#
# One grant per distinct `authority_role` used by the brewery's
# JobKinds (examples/brewery/seeds/job_kinds.toml). Without these,
# every sign-off step becomes unsignable. Scope is `all`: the role
# match (the resource match) IS the authority gate; row-level scope
# is not layered on top of the sign-off authority check.
#
# The simulator does not appear here: it drives sign-offs as the
# trusted, `_simulated`-marked actor and is authorized by the
# sim-origin policy bypass (see SimBypassPolicyClient), not by any
# seeded grant. Real employees sign their own steps via the per-role
# grants below.

[[grants]]
role = "head-brewer"
resource = "step-signoff:head-brewer"
action = "sign-off"
scope = "all"

[[grants]]
role = "brewer"
resource = "step-signoff:brewer"
action = "sign-off"
scope = "all"

[[grants]]
role = "lab-tech"
resource = "step-signoff:lab-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "qa-tech"
resource = "step-signoff:qa-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "qa-supervisor"
resource = "step-signoff:qa-supervisor"
action = "sign-off"
scope = "all"

[[grants]]
role = "packaging-tech"
resource = "step-signoff:packaging-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "shipping-clerk"
resource = "step-signoff:shipping-clerk"
action = "sign-off"
scope = "all"

[[grants]]
role = "warehouse-clerk"
resource = "step-signoff:warehouse-clerk"
action = "sign-off"
scope = "all"

[[grants]]
role = "head-of-distribution"
resource = "step-signoff:head-of-distribution"
action = "sign-off"
scope = "all"

[[grants]]
role = "sales-rep"
resource = "step-signoff:sales-rep"
action = "sign-off"
scope = "all"

[[grants]]
role = "bookkeeper"
resource = "step-signoff:bookkeeper"
action = "sign-off"
scope = "all"

[[grants]]
role = "ar-clerk"
resource = "step-signoff:ar-clerk"
action = "sign-off"
scope = "all"

[[grants]]
role = "cfo"
resource = "step-signoff:cfo"
action = "sign-off"
scope = "all"

[[grants]]
role = "head-of-people"
resource = "step-signoff:head-of-people"
action = "sign-off"
scope = "all"

[[grants]]
