# Location since these are tenant-scoped operations rather than
# tied to a specific account / vendor / employee.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "payroll-run"
label = "Payroll Run"
category = "finance"
subject_kinds = ["location"]
description = """
Biweekly payroll batch. Opened by `[periodic.biweekly-payroll]`
on every other Thursday; one Job per cycle per legal entity.
Steps walk the calculation → review → release sequence; the
terminal `payroll-release` step's side-effect handler POSTs to
/api/ledger/payroll-runs/synthesize, which queries active
employees server-side, computes per-employee gross/withheld/net
+ aggregate employer_tax, and posts the compound journal entry
(DR 6100 Payroll Expense + DR 6400 Payroll Taxes & Benefits /
CR 2150 Payroll Liability + CR 1000 Cash). Replaces the legacy
BatchEngine `[batch.payroll]` path (retired 2026-05-06; see
TODO.md "Strip BatchEngine").
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Biweekly payroll cycle fires"
metadata_defaults = { trigger_kind = "periodic", trigger_name = "biweekly-payroll" }

[[job_kind.step]]
title = "run-calculation"
kind = "task"
ready_when = "steps.trigger.done"
authority_role = "payroll-mgr"
title_template = "Run payroll calculation"

[[job_kind.step]]
title = "bookkeeper-review"
kind = "sign-off"
ready_when = "steps.run-calculation.done"
title_template = "Bookkeeper review"
authority_role = "bookkeeper"
sign_offs_required = ["bookkeeper"]

[[job_kind.step]]
title = "release-funds"
kind = "payroll-release"
ready_when = "steps.bookkeeper-review.done"
title_template = "Release funds + journal entry"
authority_role = "bookkeeper"
# Period bounds derive from the Job's open day so each biweekly
# run lands inside the same fiscal year as the labor-absorption
# JEs it offsets. `{day}` / `{day_minus_<N>}` expand at
# materialize-time via `materialize_steps_at` (#54). Pre-fix,
# hardcoded 2026-01-* literals pushed the payroll DR offset
# outside FY2025 and left 6100 Payroll at -$1.1M — breaking
# period close with `expense_lines[].balance_cents must be
# non-negative`. A biweekly run on open-day D covers [D-13, D]
# and the run is dated D (cash leaves the bank that day).
metadata_defaults = { period_start = "{day_minus_13}", period_end = "{day}", run_date = "{day}" }

[[job_kind.step]]
title = "payroll-released"
kind = "outcome"
ready_when = "steps.release-funds.done"
title_template = "Payroll released — funds sent + JE posted"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

# ---------------------------------------------------------------------------
# Quarterly sales-tax filing — opened by `[periodic.quarterly-sales-tax]`.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "sales-tax-filing"
label = "Sales Tax Filing"
category = "finance"
subject_kinds = ["location"]
description = """
Quarterly sales-tax return. Opened by the PeriodicEngine on the
filing-window anchor; the BatchEngine fanout fills the per-
jurisdiction lines a few weeks later. Steps walk the prepare →
review → file → confirm sequence.
"""

[[job_kind.step]]
title = "prepare-filing"
kind = "task"
ready_when = "true"
title_template = "Prepare filing data"
authority_role = "bookkeeper"

[[job_kind.step]]
title = "review-sign"
kind = "sign-off"
ready_when = "steps.prepare-filing.done"
title_template = "Review + sign filing"
authority_role = "bookkeeper"
sign_offs_required = ["bookkeeper"]

[[job_kind.step]]
title = "submit-remit"
kind = "tax-remittance"
ready_when = "steps.review-sign.done"
title_template = "Submit + remit filing"
authority_role = "bookkeeper"
terminal = { outcome = "filed" }
# Default Q1 2026 California sales-tax remittance so
# ledger.tax.remit emits a real filing on step.done. The
# bridge tags this filing with `derive_basis = "period-sales-tax"`,
# so the ledger overrides `amount_cents` below with the actual
# 2300 Sales Tax Payable credit balance accrued during the
# period (invoice tax_lines post here at issue time). The
# literal below is only the early-sim fallback for days with
# no 2300 activity yet.
# Period + amount derived at fire-time: the ledger-sim-bridge
# defaults period to the calendar quarter PRIOR to ctx.day and
# the ledger's derive_basis = "period-sales-tax" computes amount
# from the 2300 credit balance over that period. Only kind +
# jurisdiction live here.
metadata_defaults = { kind = "sales", jurisdiction = "US-CA" }

