# ---------------------------------------------------------------------------
# Direct-to-consumer order — the brewery /shop checkout flow.
# A guest fills out the order form on /shop/{sku} and this Job is
# the operational state. Step graph mirrors a wholesale-keg-order
# scaled down to a single line item:
#   intake (confirm + reserve) → handoff (pull from cooler)
#   → shipment (pickup or local delivery) → billing (invoice the
#   customer email).
# Decrements finished-product inventory on shipment via the
# existing `inventory.parts.consume` side effect; the line items
# come from the order metadata. Subject is the catch-all
# `acc-direct-shop` Account so direct orders aggregate cleanly
# under one customer cluster instead of needing per-email
# Account creation.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "direct-shop-order"
label = "Direct Shop Order"
category = "sales"
subject_kinds = ["account"]
description = """
A guest order placed through the brewery's /shop storefront. The
customer submits the order form; this Job opens with the line
items, customer-contact metadata, and total in metadata. Same
shape as wholesale-keg-order but scaled to a single-SKU
single-customer cart. Decrements finished-product inventory on
shipment via inventory.parts.consume; bills via
commerce.invoice.issue on the closing billing step.
"""

[[job_kind.step]]
title = "confirm-order"
kind = "order-intake"
ready_when = "true"
title_template = "Confirm order — {subject.id}"
authority_role = "shipping-clerk"
# Order metadata copied from the SPA submit:
# customer_email, customer_name, customer_phone, line_items,
# total_cents, notes. The intake step's role is to confirm
# stock + customer contact, then unblock the handoff step.
#
# `asset_id` is required by the intake StepType (designed for
# the used-device-shop tenant's per-unit lineage). Beer orders
# don't carry a per-unit asset_id; we satisfy the validator
# with the order Job's own id pattern. The shipping-clerk
# UX overlays nothing else — this default is enough.
metadata_defaults = { asset_id = "direct-shop-order" }

[[job_kind.step]]
title = "pull-from-cooler"
kind = "handoff"
ready_when = "steps.confirm-order.done"
title_template = "Pull from cooler — {subject.id}"
authority_role = "inventory-clerk"
# Pulls from the brewhouse cooler bin (FP-* SKUs are at C-NN-NN).
# `from_id`/`to_id` required by the handoff StepType (designed
# for cross-team transfers in the device-refurb tenant). Brewery
# direct-shop fulfillment is a short warehouse→shipping flow, so
# we satisfy the validator with the two staffed role names.
metadata_defaults = { from_id = "inventory-clerk", to_id = "shipping-clerk" }

[[job_kind.step]]
title = "ship-to-customer"
kind = "shipment"
ready_when = "steps.pull-from-cooler.done"
title_template = "Ship to customer — {subject.id}"
authority_role = "shipping-clerk"
# Shipment carrier defaults to local-pickup; can be flipped to
# UPS / FedEx / freight in the step UX. The existing keg-courier
# counterparty (tenant.toml) doesn't fire on direct-shop because
# its match_payload gates on a wholesale-shaped trigger; direct
# orders ship same-day or via local delivery, no scan chain.
#
# Physical pickup/ship step — tracks the moment goods leave the
# brewery. Post-#105 the COGS draw moved to the billing step
# (where revenue + cost are siamese in one JE), so the shipment
# step is purely operational here.
metadata_defaults = { direction = "outbound", origin = "loc-brewery-brewhouse", destination = "customer-pickup", line_items = [
    { sku = "FP-PALE-1-6-BBL", qty = 1, unit_price_cents = 18000, description = "Direct shop order — Pale Ale sixtel ($180 retail)" },
] }

[[job_kind.step]]
title = "invoice-customer"
kind = "billing"
ready_when = "steps.ship-to-customer.done"
title_template = "Invoice customer — {subject.id}"
authority_role = "ar-clerk"
terminal = { outcome = "completed" }
# Invoice goes to customer_email. The existing
# commerce.invoice.issue side effect mints the invoice with
# `issued_on = ctx.day` (sim-day) and the line items from the
# order metadata.
#
# Pre-2026-05-04 these defaults were `line_items = []` with a
# comment that per-Job line items would overlay at open time.
# But the sim's create_job_with_steps path doesn't have a
# per-Job overlay hook (#33 in the original comment) — it
# uses metadata_defaults verbatim. The empty array then made
# every direct-shop-order billing step fail
# `commerce.invoice.issue` with BadArgs ("line_items is
# empty"), surfaced cleanly by the side-effect-failures
# instrumentation (commit 6fb8b62 + 5ede132).
#
# Real-Job overlay (when the /shop SPA submits an order)
# replaces these defaults with the customer's actual order
# items — that path still works. The defaults here are the
# sim-only fallback so the engine produces a complete invoice
# on step.done with at least a placeholder line.
metadata_defaults = { account_id = "acc-direct-shop", amount_cents = 18000, currency = "USD", line_items = [
    { sku = "FP-PALE-1-6-BBL", qty = 1, amount_cents = 18000, revenue_category = "retail", description = "Direct shop order — Pale Ale sixtel ($180 retail, vs $150 wholesale)" },
] }

# ---------------------------------------------------------------------------
# Morning brew — IPA day. Same shape as `morning-brew` (the Pale
# Ale heartbeat) but consumes IPA-recipe ingredients and produces
# FP-IPA-* SKUs. The shape-driven engine picks between this and
# the Pale Ale variant via the `[job_rates]` split in tenant.toml
# (default 0.7 pale + 0.3 IPA = 1.0 brewing days/week). Adding
# more recipes is a matter of authoring more JobKinds + adjusting
# rates, not engine code.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "morning-brew-ipa"
label = "Morning Brew — IPA"
category = "production"
subject_kinds = ["location"]
description = """
Daily IPA brewing cycle. Identical step graph to morning-brew
(mash → lauter → boil → whirlpool → fermentation → package),
but ingredients drain from the hop-forward IPA recipe (more
Cascade + Centennial in the whirlpool) and packaged output
goes to FP-IPA-* SKUs.
"""

# Trigger + brew/skip fork — see morning-brew (pale) for the full
# pattern. Engine auto-completes the trigger at Job-open and the
# demand-check forks between the brew path and the day-skipped
# terminal.
# REVIEW(v2 fork): brew/skip fork over the free-text
# `checklist.outcome` field — same shape as morning-brew (pale).
# Branches are mutually exclusive on `= "brew"` / `= "oversupply"`;
# lint-clean Phase-3 coverage wants `checklist.outcome` promoted to a
# declared enum on the StepType (out of scope for this data migration).
[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Periodic action — daily IPA brewing schedule fires"
metadata_defaults = { trigger_kind = "periodic", trigger_name = "morning-brew-shift" }

[[job_kind.step]]
title = "demand-check"
kind = "demand-gate"
ready_when = "steps.trigger.done"
authority_role = "head-brewer"
title_template = "Demand check — should we brew IPA today?"
# batch_yield: IPA packages 320 FP-IPA-1-6-BBL sixtels per brew (see
# morning-brew pale for the full rationale — pipeline credit so the
# daily review doesn't double-brew through the brew lag).
metadata_defaults = { target_skus = ["FP-IPA-1-6-BBL"], expected_daily_demand = { FP-IPA-1-6-BBL = 470 }, batch_yield = { FP-IPA-1-6-BBL = 320 }, demand_window_days = 30, oversupply_multiplier = 1.5, is_demand_check = true }

[[job_kind.step]]
title = "plan"
kind = "scheduling"
ready_when = "steps.demand-check.done AND steps.demand-check.metadata.outcome = \"brew\""
authority_role = "senior-brewer"
title_template = "Plan today's IPA — {subject.id}"
metadata_defaults = { recipes_planned = ["West Coast IPA"], batch_size_bbl = 30 }

[[job_kind.step]]
title = "mash-in"
kind = "production-consume"
ready_when = "steps.plan.done"
title_template = "Mash in (drain IPA ingredients)"
authority_role = "brewer"
# IPA grain bill: more 2-row, less Munich; aggressive Cascade
# hops; California ale yeast like the Pale Ale.
metadata_defaults = { mash_temp_f = 150, mash_minutes = 60, ingredients_consumed = [
    { part_sku = "ING-MALT-2ROW-50", qty = 160 },
    { part_sku = "ING-MALT-MUNICH-50", qty = 12 },
    { part_sku = "ING-HOPS-CASCADE-44", qty = 6 },
    { part_sku = "ING-YEAST-CALI-1L", qty = 6 },
] }

[[job_kind.step]]
title = "lauter"
kind = "task"
ready_when = "steps.mash-in.done"
authority_role = "brewer"
title_template = "Lauter / sparge"
metadata_defaults = { sparge_minutes = 90, runoff_gravity = "" }

[[job_kind.step]]
title = "boil"
kind = "task"
ready_when = "steps.lauter.done"
authority_role = "brewer"
title_template = "Boil + late hop additions"
metadata_defaults = { boil_minutes = 60, ibu_target = 65, og_target = 1.066 }

[[job_kind.step]]
title = "whirlpool"
kind = "task"
ready_when = "steps.boil.done"
authority_role = "brewer"
title_template = "Whirlpool & knockout"
metadata_defaults = { whirlpool_minutes = 20, knockout_temp_f = 68 }

[[job_kind.step]]
title = "fermentation-start"
kind = "task"
ready_when = "steps.whirlpool.done"
authority_role = "brewer"
title_template = "Fermentation start (pitch yeast + dry hop schedule)"
metadata_defaults = { ferm_temp_c = 19, yeast_strain = "California Ale", vessel = "" }

[[job_kind.step]]
title = "package"
kind = "production-produce"
ready_when = "steps.fermentation-start.done"
title_template = "Package + cellar handoff (IPA)"
authority_role = "packaging-tech"
# IPA brews skew sixtel-heavy because tap rotations turn IPAs
# faster than house pales — bars want fresh hops, smaller kegs
# turn over before bitterness drops. 18 half-BBLs + 48 sixtels
# of FP-IPA-* per 30-BBL brew.
metadata_defaults = { batch_id = "", excise_bbl = 133, produces_products = [
    { sku = "FP-IPA-1-2-BBL", qty = 160, location_id = "loc-brewery-brewhouse", unit_cost_cents = 2500 },
    { sku = "FP-IPA-1-6-BBL", qty = 320, location_id = "loc-brewery-brewhouse", unit_cost_cents = 850 },
], parts_consumed = [
    { part_sku = "PKG-KEG-FILL-HALF-BBL", qty = 160 },
    { part_sku = "PKG-KEG-FILL-SIXTEL", qty = 320 },
    { part_sku = "PKG-CO2-50LB", qty = 1 },
] }

[[job_kind.step]]
title = "brew-completed"
kind = "outcome"
ready_when = "steps.package.done"
title_template = "Brew completed — packaged + handed off"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

[[job_kind.step]]
title = "day-skipped"
kind = "outcome"
ready_when = "steps.demand-check.done AND steps.demand-check.metadata.outcome = \"oversupply\""
title_template = "Day skipped — sufficient IPA stock on hand"
terminal = { outcome = "skipped" }
metadata_defaults = { outcome_kind = "skipped" }

