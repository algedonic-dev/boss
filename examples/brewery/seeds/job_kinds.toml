# ---------------------------------------------------------------------------
# Batch QC Hold — anomaly-path Sub-Job for morning-brew (and other
# production JobKinds). When a QC checkpoint flags off-spec results
# (microbial contamination, pH drift, gravity miss), the parent Job
# spawns one of these on the same brewhouse Subject. This is the
# canonical example of how the Job abstraction handles non-DAG
# flows — the parent waits at the QC step while this sub-Job runs
# its own decision tree, and the parent step transitions to
# completed (resume packaging) or aborted (write-off + re-brew)
# based on the triage outcome.
#
# Step graph branches by `tier 2` triage decision:
#   - Tier 3a `re-test` runs another QC scan; if passing the parent
#     QC step completes and packaging proceeds.
#   - Tier 3b `re-blend` adjusts the batch via dilution / adjunct
#     addition; parent QC step completes.
#   - Tier 3c `discard` initiates batch-loss accounting; parent QC
#     step aborts; a `batch-writeoff-recovery` Job opens for the
#     financial side.
#
# The audit log reads as a real causal trace — each branch carries
# its own actor (qa-tech for lab, qa-supervisor for triage,
# packaging-tech for blend), and the cross-Job linkage via
# `parent_job_id` in metadata makes the sub-Job query-able from
# the parent and vice versa.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "batch-qc-hold"
label = "Batch QC Hold (anomaly branch)"
category = "production"
subject_kinds = ["location"]
description = """
Opened when a parent production Job (typically morning-brew) flags
a QC anomaly. Lab analysis + triage decision; outcome determines
whether the parent batch packages, re-blends, or gets written off.
The parent JobKind waits on this sub-Job before completing its QC
step.
"""

# Linear chain. The triage-decision branches (re-test / re-blend /
# discard) described in the header are captured in the
# `apply-triage` step's `branch` metadata + the `triage-decision`
# sign-off's `decision`, not as separate predicate-graph branches —
# the sub-Job resolves to one terminal (release hold) regardless of
# branch, so a linear chain is the faithful v2 shape.
[[job_kind.step]]
title = "lab-analysis"
kind = "task"
ready_when = "true"
authority_role = "qa-tech"
title_template = "Lab analysis — collect + run extended panel"
metadata_defaults = { panel = ["pH", "fg", "abv", "diacetyl", "microbial_plating"], parent_job_id = "", parent_step_id = "", batch_id = "" }

[[job_kind.step]]
title = "document-findings"
kind = "task"
ready_when = "steps.lab-analysis.done"
authority_role = "qa-tech"
title_template = "Document findings — extended results"
metadata_defaults = { findings = "", anomaly_confirmed = false }

[[job_kind.step]]
title = "triage-decision"
kind = "sign-off"
ready_when = "steps.document-findings.done"
authority_role = "qa-supervisor"
title_template = "Triage decision — re-test, re-blend, or discard"
sign_offs_required = ["qa-supervisor"]
metadata_defaults = { decision = "pending", rationale = "" }

[[job_kind.step]]
title = "apply-triage"
kind = "task"
ready_when = "steps.triage-decision.done"
authority_role = "qa-tech"
title_template = "Apply triage decision — execute the branch"
metadata_defaults = { branch = "", action_taken = "" }

[[job_kind.step]]
title = "release-hold"
kind = "handoff"
ready_when = "steps.apply-triage.done"
authority_role = "qa-supervisor"
title_template = "Resume parent Job — release hold"
terminal = { outcome = "resolved" }
metadata_defaults = { release_decision = "", parent_resumes = true }



# ---------------------------------------------------------------------------
# AP Payment Run — daily batch settlement of approved vendor bills.
#
# Procurement (ingredient-restock) ends at bill-approval (DR 1300 /
# CR 2100). This Job picks up from there: every business day a
# bookkeeper opens an ap-payment-run on the brewery location,
# queries approved-but-unpaid vendor_invoices due within the window,
# cuts a check / ACH for each, and marks them paid. The mark-paid
# side effect fires inventory.vendor_invoice.paid which projects
# to finance.bill.paid (DR 2100 / CR 1000 cash out, AP drains).
#
# Without this Job the direct-method cash flow shows AP credits
# but zero debits — bills accrue forever, books drift from cash
# reality. (#128 finding.)
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "ap-payment-run"
label = "Daily AP Payment Run"
category = "finance"
subject_kinds = ["location"]
description = """
Daily batch settlement of approved vendor invoices. Subject is
the brewery location (the entity issuing the checks / ACH).
The bookkeeper queries approved-but-unpaid bills due within the
window, batches them into a single payment run, and marks each
paid via a side-effect that drains 2100 AP back into 1000 Cash.
"""

[[job_kind.step]]
title = "pull-aging-report"
kind = "task"
ready_when = "true"
authority_role = "bookkeeper"
title_template = "Pull due-bills aging report"
# At step.done the engine will populate `invoices_to_pay` with
# the IDs of vendor_invoices where status=approved + due_on
# within the window. v1 uses a max-30-day window so payments
# track standard net-30 terms.
metadata_defaults = { window_days = 30, invoices_to_pay = [] }

[[job_kind.step]]
title = "cut-checks"
kind = "bill-payment-batch"
ready_when = "steps.pull-aging-report.done"
authority_role = "bookkeeper"
title_template = "Cut checks + ACH for due bills"
# This step's side-effect handler (inventory.bill.payment_batch)
# emits a single inventory.bill.payment_batch topic. The route
# table sends it to POST /api/inventory/vendor-invoices/batch-pay
# which queries status=approved invoices, flips each to paid
# (paid_on = step.day), and emits one inventory.vendor_invoice.paid
# per invoice. Those project to finance.bill.paid → DR 2100 / CR 1000.
metadata_defaults = { payment_method = "ach", check_run_id = "" }

[[job_kind.step]]
title = "record-provenance"
kind = "task"
ready_when = "steps.cut-checks.done"
authority_role = "bookkeeper"
title_template = "Record check-run provenance + file"
terminal = { outcome = "completed" }
# Audit-trail closer: log totals + match GL period.
metadata_defaults = { total_paid_cents = 0, bill_count = 0, run_notes = "" }

