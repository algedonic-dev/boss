# ---------------------------------------------------------------------------
# Facility overhead — the monthly operating-cost cycle for the brewery
# facility (rent + utilities). Subject is the brewery Location. Each cycle
# approves a rent bill (→ 6200 Operating Expense — Rent) and a utilities
# bill (→ 6300 Operating Expense — General) through the ledger's GENERAL AP
# subledger — routed by each bill's `bill_category` via bill_accounts.toml,
# decoupled from the inventory parts vendor-invoice — then settles them
# (DR 2100 A/P / CR 1000 Cash). This is the OpEx the brewery's P&L was
# missing. Opened by `[periodic.monthly-facility-overhead]`. Adding another
# expense (insurance, services, …) is one more `expense-bill` step with a
# different `bill_category` — zero code.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "facility-overhead"
label = "Facility Overhead"
category = "operations"
subject_kinds = ["location"]
description = """
Monthly operating-cost cycle for the brewery facility: approve the rent +
utilities bills through the ledger AP subledger, then pay them. Opened by
`[periodic.monthly-facility-overhead]` on loc-brewery-brewhouse. Each bill's
`bill_category` routes its GL debit (bill_accounts.toml); the credit is
always 2100 A/P, drained to 1000 Cash by the payment step.
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Monthly facility-overhead cycle fires"
metadata_defaults = { trigger_kind = "periodic", trigger_name = "facility-overhead" }

[[job_kind.step]]
title = "approve-rent"
kind = "expense-bill"
ready_when = "steps.trigger.done"
title_template = "Approve monthly facility rent"
authority_role = "bookkeeper"
# ~$125k/mo lease on the 250-BBL production house + taproom → ~$1.5M/yr.
# Routed to 6200 Operating Expense — Rent by bill_category.
metadata_defaults = { bill_category = "rent", amount_cents = 12500000, vendor = "Cascade Industrial Properties", currency = "USD" }

[[job_kind.step]]
title = "approve-utilities"
kind = "expense-bill"
ready_when = "steps.approve-rent.done"
title_template = "Approve monthly utilities"
authority_role = "bookkeeper"
# ~$175k/mo power + water + gas + glycol refrigeration for a 250-BBL house
# → ~$2.1M/yr. Routed to 6300 Operating Expense — General by bill_category.
metadata_defaults = { bill_category = "utilities", amount_cents = 17500000, vendor = "Regional Power & Water", currency = "USD" }

[[job_kind.step]]
title = "pay-overhead"
kind = "expense-bill-payment"
ready_when = "steps.approve-utilities.done"
title_template = "Settle approved facility bills"
authority_role = "bookkeeper"

[[job_kind.step]]
title = "overhead-posted"
kind = "outcome"
ready_when = "steps.pay-overhead.done"
title_template = "Facility overhead recognized + paid"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

