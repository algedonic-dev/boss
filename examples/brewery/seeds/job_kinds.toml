# Taproom shift close — daily by-the-pour sales of the sixtels + co-product
# half-BBLs the brewery over-produces. Wholesale buys PALE-1/2 + IPA-1/6, so
# PALE-1/6 + IPA-1/2 accumulate; the taproom monetizes that surplus at retail
# pour value and posts to Revenue — Taproom (4120). The billing line_items
# drive both the FG decrement and the revenue+COGS JE (post-#105).
# ---------------------------------------------------------------------------
[[job_kind]]
kind = "taproom-shift-close"
label = "Taproom Shift Close"
category = "sales"
subject_kinds = ["account"]
description = """
End-of-day taproom reconciliation: ring up the shift's by-the-glass sales
(poured from surplus sixtels + co-product half-BBLs) and post the day's
taproom revenue. One per operating day; a shift-lead closes the register and
a bookkeeper posts the revenue.
"""

[[job_kind.step]]
title = "ring-sales"
kind = "order-intake"
ready_when = "true"
title_template = "Ring up taproom shift sales"
authority_role = "shift-lead"
metadata_defaults = { asset_id = "taproom-shift" }

[[job_kind.step]]
title = "close-register"
kind = "billing"
ready_when = "steps.ring-sales.done"
title_template = "Close register + post taproom revenue"
authority_role = "bookkeeper"
terminal = { outcome = "completed" }
# By-the-pour retail value: a sixtel (~41 16oz pours) at ~$7 ≈ $287; a
# half-BBL (~124 pours) ≈ $868. ~30 sixtels + 8 half-BBLs of the surplus
# SKUs per shift ≈ $15.5k/day → ~$5.7M/yr taproom revenue. COGS draws on
# the same real FG cost basis as wholesale, so taproom margin is honest.
metadata_defaults = { account_id = "acc-direct-shop", amount_cents = 1555400, currency = "USD", line_items = [
    { sku = "FP-PALE-1-6-BBL", qty = 30, amount_cents = 861000, revenue_category = "taproom", description = "Pale Ale sixtels — by-the-pour (30 × $287)" },
    { sku = "FP-IPA-1-2-BBL", qty = 8, amount_cents = 694400, revenue_category = "taproom", description = "IPA half-BBLs — by-the-pour (8 × $868)" },
] }

