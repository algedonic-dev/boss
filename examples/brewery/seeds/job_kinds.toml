# JobKind rows for Boss Brewery.
#
# Each [[job_kind]] block authors one row of the `job_kinds` table.
# Schema mirrors `JobKindSpec` in
# crates/core/boss-jobs/src/registry.rs — the brewery prepare step
# (`boss-brewery-sim prepare`) publishes these into the JobKind
# registry.
#
# Step DAGs use existing StepTypes from
# crates/core/boss-jobs/src/step_registry.rs (no new step kinds proposed
# in this seed bundle — the brewery deliberately tries to land
# without authoring new step kinds, to validate that the existing
# catalog covers a different vertical). Where a step kind feels
# like a stretch, the per-step `metadata_defaults` carries
# brewery-shaped fields (mash_temp_f, boil_minutes, og_gravity,
# ibu_target, ferm_temp_c, …).
#
# Authority roles reference the brewery Roles seeded in
# `classes.toml`. The shipped JobKindSpec validation does not yet
# cross-check authority_role against the Class registry; when it
# does, these rows must resolve.

# ---------------------------------------------------------------------------
# Daily morning brew — the production heartbeat. One per brewing day
# per brewhouse Location.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "morning-brew"
label = "Morning Brew"
category = "production"
subject_kinds = ["location"]
description = """
Daily production cycle on the brewhouse. Runs every brewing morning
on the brewhouse Subject. Step graph maps directly onto the
mash → lauter → boil → whirlpool → fermentation-start lifecycle.
Cellar handoff to the conditioning side closes the Job.

Tier 0 is a demand-check gate: the engine reads FG on_hand for
the target SKUs and aborts the entire Job (no mash, no consumption)
when on_hand exceeds the configured demand_window_days × trailing
daily demand. Prevents unbounded inventory growth during sim runs
and demonstrates the Job abstractions support for decision-gated
DAGs.
"""
# JobKind-level display/routing hints. `surfaces` lists the
# operational pages this JobKind appears on.
metadata = { surfaces = ["qa"] }

# Trigger. Captures the opening signal (periodic action fires at
# brewing-shift start) so operators see "how did this Job get here"
# as a real DAG node instead of inferred from audit_log. Engine
# auto-completes this step at Job-open (ready_when = "true").
[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Periodic action — daily brewing schedule fires"
metadata_defaults = { trigger_kind = "periodic", trigger_name = "morning-brew-shift" }

# Demand gate — read FG inventory and decide whether to brew today.
# This is the FORK POINT. On oversupply the demand-check completes
# with metadata.outcome="oversupply" and the Job routes to the
# `day-skipped` terminal WITHOUT consuming raw ingredients or
# producing FG. On "brew" it routes through the mash → … → package
# brew path. The decision is captured in audit_log so the operator
# can read the no-brew-today rationale as a real event.
#
# REVIEW(v2 fork): the brew/skip fork discriminates on the free-text
# `checklist.outcome` metadata field. The Phase-3 fork-coverage lint
# treats `outcome` as a wildcard domain (the `checklist` StepType
# declares no `outcome` enum) and would ask for a bare
# `steps.demand-check.done` fallback successor. We deliberately keep
# both branches mutually exclusive on `= "brew"` / `= "oversupply"`
# (correct runtime semantics — exactly one fires, the sibling is
# Skipped) rather than add a bare-done fallback that would double-fire
# on the brew path. Lint-clean fork coverage wants `checklist.outcome`
# promoted to a declared enum `brew|oversupply` on the StepType — a
# StepType change out of scope for this data-only migration.
[[job_kind.step]]
title = "demand-check"
kind = "demand-gate"
ready_when = "steps.trigger.done"
authority_role = "head-brewer"
title_template = "Demand check — should we brew today?"
# Gate the brew on the bottleneck SKU — for PALE that's the
# half-BBL keg (wholesale-keg-order consumes 1 FP-PALE-1-2-BBL
# per order at ~35/day baseline, peaking ~240/day with the
# weekday × month multiplier stack). Sixtels (FP-PALE-1-6-BBL)
# have no wholesale consumer in the current JobKinds and
# would oversupply first if gated, blocking the brew the
# half-BBL DOES need — see the prior attempt's
# "1/2-BBL starvation" trace.
#
# Threshold math: 240 × 30d window × 1.5 multiplier = 10,800.
# Opening balance 5,000 + net (353-240) = 113/day fills the
# threshold in ~51 sim-days, at which point the gate trips
# and brews route to the skipped-outcome until consumption
# catches back up. Caps in-flight Jobs naturally instead of
# forcing the morning-brew rate to be wrong.
# `batch_yield` — finished units of each target SKU produced by ONE
# brew of this kind (the package step's produces_products qty for that
# SKU). The dispatcher's in-flight-aware gate credits brews already in
# the pipeline against the threshold: effective_on_hand = real_on_hand
# + in_flight_brews × batch_yield. Without it, a deterministic daily
# review would re-brew every working day through the multi-day brew
# lag before the first batch lands — the throttle-up the open-loop
# gate lacked. PALE packages 210 FP-PALE-1-2-BBL per brew.
metadata_defaults = { target_skus = ["FP-PALE-1-2-BBL"], expected_daily_demand = { FP-PALE-1-2-BBL = 240 }, batch_yield = { FP-PALE-1-2-BBL = 210 }, demand_window_days = 30, oversupply_multiplier = 1.5, is_demand_check = true }

# Brew path — gated on the demand-check deciding "brew".
[[job_kind.step]]
title = "plan"
kind = "scheduling"
ready_when = "steps.demand-check.done AND steps.demand-check.metadata.outcome = \"brew\""
authority_role = "senior-brewer"
title_template = "Plan today's brew — {subject.id}"
metadata_defaults = { recipes_planned = [], batch_size_bbl = 30 }

[[job_kind.step]]
title = "mash-in"
kind = "production-consume"
ready_when = "steps.plan.done"
title_template = "Mash in (drain ingredients)"
authority_role = "brewer"
# Default ingredient drawdown for a 30-bbl brew. Recipe-level
# derivation (per-style ingredient lists) is the faker hook in
# #33; v1 ships the canonical pale-ale grain bill so the
# inventory.parts.consume side effect drains real SKUs. Grain bill
# sized to the 250-BBL batch this JobKind packages (~157 BBL of
# finished beer across the produce step below): a pale ale at
# ~2 lb grain/gal needs ~9,800 lb = ~196 fifty-lb bags of 2-row +
# ~10% specialty munich, plus the hop + yeast charge. The
# `inventory.parts.consume` side effect drains these raw SKUs at
# their inventory cost, which is what the finished-goods cost basis
# (and therefore COGS) is derived from — no hard-coded margin.
metadata_defaults = { mash_temp_f = 152, mash_minutes = 60, ingredients_consumed = [
    { part_sku = "ING-MALT-2ROW-50", qty = 196 },
    { part_sku = "ING-MALT-MUNICH-50", qty = 20 },
    { part_sku = "ING-HOPS-CASCADE-44", qty = 4 },
    { part_sku = "ING-YEAST-CALI-1L", qty = 6 },
] }

[[job_kind.step]]
title = "lauter"
kind = "task"
ready_when = "steps.mash-in.done"
authority_role = "brewer"
title_template = "Lauter / sparge"
metadata_defaults = { sparge_minutes = 90, runoff_gravity = "" }

[[job_kind.step]]
title = "boil"
kind = "task"
ready_when = "steps.lauter.done"
authority_role = "brewer"
title_template = "Boil"
metadata_defaults = { boil_minutes = 60, ibu_target = 35, og_target = 1.052 }

[[job_kind.step]]
title = "whirlpool"
kind = "task"
ready_when = "steps.boil.done"
authority_role = "brewer"
title_template = "Whirlpool & knockout"
metadata_defaults = { whirlpool_minutes = 20, knockout_temp_f = 68 }

[[job_kind.step]]
title = "fermentation-start"
kind = "task"
ready_when = "steps.whirlpool.done"
authority_role = "brewer"
title_template = "Fermentation start (pitch yeast)"
metadata_defaults = { ferm_temp_c = 19, yeast_strain = "", vessel = "" }

# QC checkpoint between fermentation and packaging. Kept as a normal
# linear step for now. On anomaly the engine spawns a `batch-qc-hold`
# sub-Job on the same brewhouse Subject and the parent waits for the
# sub-Job's resolution before packaging fires.
# REVIEW(v2 fork): QC-hold sub-Job — the anomaly-path delegation to
# the `batch-qc-hold` sub-JobKind is handled separately (dispatcher /
# delegate-subjob), NOT modeled in this predicate graph. This step
# stays a plain checklist on the brew path.
[[job_kind.step]]
title = "qc-checkpoint"
kind = "checklist"
ready_when = "steps.fermentation-start.done"
authority_role = "qa-tech"
title_template = "QC checkpoint — pH, gravity, microbial"
# `is_qc_checkpoint = true` marks this step as the QC anomaly
# hook. Engine reads the flag (not the title prefix) when
# deciding whether to spawn a batch-qc-hold sub-Job on
# anomaly. Pre-fix the engine string-matched the title.
metadata_defaults = { ph_target = 4.4, fg_target = 1.012, microbial_pass = true, batch_id = "", is_qc_checkpoint = true }

[[job_kind.step]]
title = "package"
kind = "production-produce"
ready_when = "steps.qc-checkpoint.done"
title_template = "Package + cellar handoff"
authority_role = "packaging-tech"
# Default Pale Ale split for one daily brew run on a 250-BBL
# industrial brewhouse. 250 BBL ≈ 500 half-BBLs of capacity; the
# brewery splits ~210 half-BBLs + 315 sixtels (proportions tuned to
# match wholesale-keg-order's daily consumption: rate=35/day ×
# qty=4 half-BBLs/order = 140 half-BBLs/day, vs production
# 0.7/day × 210 = 147/day → 5% surplus). Pre-2026-05-04 the yield
# was 24+36 (a small craft 30-BBL brew), which made the sim drain
# inventory in hours and the regen 400 once on PUT
# /api/products/FP-PALE-1-2-BBL/inventory/consume.
#
# The products.produce side effect fires on this step's
# done-transition and increments finished_product_inventory.on_hand
# at loc-brewery-brewhouse via boss-products.
metadata_defaults = { batch_id = "", excise_bbl = 158, produces_products = [
    # FG cost basis is DERIVED at runtime by products.produce from this
    # brew's real consumed inputs — the mash-in `ingredients_consumed`
    # (196×$25 2-row + 20×$30 Munich + 4×$300 Cascade + 6×$15 yeast ≈
    # $6,790) plus packaging `parts_consumed` — each at its real inventory
    # avg_cost, allocated across these kegs by volume. COGS thus comes
    # from real purchases, not a percentage-of-price plug. `unit_cost_cents`
    # is only a fallback if the real cost can't be resolved; it matches the
    # ~$25.5/half-BBL, ~$8.5/sixtel the BOM derives.
    { sku = "FP-PALE-1-2-BBL", qty = 210, location_id = "loc-brewery-brewhouse", unit_cost_cents = 2550 },
    { sku = "FP-PALE-1-6-BBL", qty = 315, location_id = "loc-brewery-brewhouse", unit_cost_cents = 850 },
], parts_consumed = [
    # Packaging draws — one keg-fill kit per keg packaged + CO2 for
    # the whole batch (~1 lb CO2 per BBL, so 30 BBL ≈ ~0.6 of a
    # 50-lb cylinder; round to 1 cylinder per brew for sim).
    { part_sku = "PKG-KEG-FILL-HALF-BBL", qty = 210 },
    { part_sku = "PKG-KEG-FILL-SIXTEL", qty = 315 },
    { part_sku = "PKG-CO2-50LB", qty = 1 },
] }

# Terminal outcomes — two branches the engine selects between based
# on the demand-check's outcome metadata. Exactly one lands
# Completed per Job; the sibling is Skipped. Makes the branching
# visible at the DAG instead of inferred from step status alone.
[[job_kind.step]]
title = "brew-completed"
kind = "outcome"
ready_when = "steps.package.done"
title_template = "Brew completed — packaged + handed off"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

[[job_kind.step]]
title = "day-skipped"
kind = "outcome"
# Skipped outcome branches straight off the demand-check decision —
# it doesn't wait for the brew path (which won't run on this path).
ready_when = "steps.demand-check.done AND steps.demand-check.metadata.outcome = \"oversupply\""
title_template = "Day skipped — sufficient stock on hand"
terminal = { outcome = "skipped" }
metadata_defaults = { outcome_kind = "skipped" }

# ---------------------------------------------------------------------------
# Sale — wholesale account acquisition. Models the new-account
# funnel: a sales rep prospecting a bar / restaurant / distributor
# from cold-outreach through first-order. Once the prospect
# converts, the recurring relationship is captured by
# wholesale-keg-order Jobs against the same Account. Subject is
# the prospect Account (acc-prospect-* pool seeded by
# boss-brewery-data-seed).
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "sale"
label = "Wholesale Account — Sales Pipeline"
category = "sales"
subject_kinds = ["account"]
description = """
The new-account acquisition funnel for wholesale customers.
Subject is the prospect Account. Tier 0 fires the first-touch
outreach; tier 1 qualifies fit (geography, license, beer program);
tier 2 books and runs the tasting visit; tier 3 sends the pricing
proposal; tier 4 gets ops sign-off on adding the account to the
weekly route; tier 5 marks the milestone — first-order placed.
The recurring keg orders that follow are captured by separate
wholesale-keg-order Jobs against the same Account.
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Sales rep opens a new prospect pursuit"
metadata_defaults = { trigger_kind = "operator", trigger_name = "sales-rep-discretion" }

[[job_kind.step]]
title = "first-touch"
kind = "outreach"
ready_when = "steps.trigger.done"
title_template = "First-touch outreach — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { channel = "email", purpose = "Introduce the brewery, share the wholesale price list, gauge interest" }

[[job_kind.step]]
title = "qualify"
kind = "qualification"
ready_when = "steps.first-touch.done"
title_template = "Qualify the prospect"
authority_role = "sales-rep"
metadata_defaults = { criteria = ["geography within owned route", "on-premise license active", "dedicated craft taps"], outcome = "" }

[[job_kind.step]]
title = "book-tasting"
kind = "scheduling"
ready_when = "steps.qualify.done"
title_template = "Book the tasting visit"
authority_role = "sales-rep"

[[job_kind.step]]
title = "tasting-visit"
kind = "outreach"
ready_when = "steps.book-tasting.done"
title_template = "Tasting visit"
authority_role = "sales-rep"
metadata_defaults = { channel = "demo", purpose = "Pour the core five + one seasonal; capture which SKUs the buyer wants on tap" }

[[job_kind.step]]
title = "pricing-proposal"
kind = "quote"
ready_when = "steps.tasting-visit.done"
title_template = "Send pricing proposal — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4, unit_price_cents = 30000, description = "Pale Ale 1/2 BBL keg" },
    { sku = "FP-IPA-1-6-BBL", qty = 8, unit_price_cents = 15000, description = "IPA 1/6 BBL keg" },
] }

[[job_kind.step]]
title = "ops-signoff"
kind = "sign-off"
ready_when = "steps.pricing-proposal.done"
title_template = "Ops sign-off — add to weekly route"
authority_role = "head-of-distribution"

[[job_kind.step]]
title = "onboarded"
kind = "outcome"
ready_when = "steps.ops-signoff.done"
title_template = "Account onboarded — first order placed"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

# ---------------------------------------------------------------------------
# Wholesale keg order — recurring orders from distributors, bars,
# restaurants, retail.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "wholesale-keg-order"
label = "Wholesale Keg Order"
category = "sales"
subject_kinds = ["account"]
description = """
A recurring keg order from a wholesale customer (distributor, bar,
restaurant, retail). Subject is the customer (Account). Order
quantity + delivery date go in Job metadata; cellar techs work the
production tier; distribution drivers pick up the delivery tier.
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Customer ordered — keg request from {subject.id}"
metadata_defaults = { trigger_kind = "event", trigger_name = "wholesale-customer-order" }

[[job_kind.step]]
title = "confirm-order"
kind = "order-intake"
ready_when = "steps.trigger.done"
title_template = "Confirm order — {subject.id}"
# Default order shape — 4 half-BBL kegs of Pale Ale + 8 sixtels
# of IPA, matching the shipment step's `consumes_products` and
# the billing step's $2,400 invoice template. The 32+64 numbers
# this used to carry pre-2026-05-04 came from the original demo
# template, but the shipment side was rebalanced to 4+8 for sim-
# economic balance (production 210/315 per brew × 0.7-1.0 rate vs
# wholesale 35 orders/day × 4+8 = sustainable). Intake + billing
# now match shipment so the customer is billed for what shipped.
# Real-world wholesale-keg-order Jobs would override per-customer
# at intake time, but the canonical shape is enough for the
# demo's flea-circus visual: every spawned Job shows real SKUs +
# quantities, not an empty placeholder.
metadata_defaults = { delivery_window = "", line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4, unit_price_cents = 30000, description = "Pale Ale 1/2 BBL keg" },
    { sku = "FP-IPA-1-6-BBL", qty = 8, unit_price_cents = 15000, description = "IPA 1/6 BBL keg" },
    { sku = "FP-STOUT-1-6-BBL", qty = 1, unit_price_cents = 15000, description = "Stout 1/6 BBL keg" },
    { sku = "FP-LAGER-1-6-BBL", qty = 1, unit_price_cents = 15000, description = "Lager 1/6 BBL keg" },
    { sku = "FP-HAZY-1-6-BBL", qty = 1, unit_price_cents = 15000, description = "Hazy IPA 1/6 BBL keg" },
] }

# Stock-check gate — agent-executed (the dispatcher reads real finished-goods
# stock for the order's line_items and decides fulfill | backorder, computer-
# speed on step.ready). A release valve that costs no labor: an order the
# cooler can't cover exits to the `backordered` outcome instead of marching
# through pick → ship → bill against stock that isn't there. The old flow had
# no inventory check at all. See docs/design/brewery-model-completeness.md.
[[job_kind.step]]
title = "stock-check"
kind = "availability-gate"
ready_when = "steps.confirm-order.done"
title_template = "Stock check — fulfill from the cooler?"
metadata_defaults = { line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4 },
    { sku = "FP-IPA-1-6-BBL", qty = 8 },
    { sku = "FP-STOUT-1-6-BBL", qty = 1 },
    { sku = "FP-LAGER-1-6-BBL", qty = 1 },
    { sku = "FP-HAZY-1-6-BBL", qty = 1 },
] }

# Pull + stage the kegs from the cooler — the physical pick a warehouse hand
# performs (human labor), gated on the stock-check deciding "fulfill". This is
# the fulfillment step the old flow was missing (it jumped straight from
# acknowledge to ship). Finished goods are relieved here against the kegs
# actually pulled — see the FG-drawdown-on-pick rule in rules.toml. Wholesale
# ships from the stock morning-brew builds; there is no per-order brew.
[[job_kind.step]]
title = "pull-and-stage"
kind = "handoff"
ready_when = "steps.stock-check.done AND steps.stock-check.metadata.outcome = \"fulfill\""
title_template = "Pull + stage kegs from the cooler"
authority_role = "warehouse-lead"
metadata_defaults = { from_id = "inventory-clerk", to_id = "shipping-clerk", line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4 },
    { sku = "FP-IPA-1-6-BBL", qty = 8 },
    { sku = "FP-STOUT-1-6-BBL", qty = 1 },
    { sku = "FP-LAGER-1-6-BBL", qty = 1 },
    { sku = "FP-HAZY-1-6-BBL", qty = 1 },
] }
[[job_kind.step]]
title = "deliver"
kind = "shipment"
ready_when = "steps.pull-and-stage.done"
title_template = "Deliver"
# Logistics step — driver confirms delivery via the courier
# counterparty's scan chain, not via exec sign-off. Real
# brewery ops don't gate Job closure on a manager signing
# off a delivered keg.
#
# `line_items` drives shipping_line_items (the shipment
# projection's per-SKU rows) via the `shipping.create` side
# effect. Pre-#105 a sibling `consumes_products` array drove
# `products.consume` for the COGS draw. Post-#105 the billing
# step's line_items carry sku + qty and the `invoice_issued`
# posting rule emits the COGS pair in the same JE as revenue;
# the shipment becomes purely physical (ship-out date + scan
# chain), with no GL movement.
metadata_defaults = { direction = "outbound", origin = "loc-brewery-brewhouse", destination = "{subject.id}", carrier = "local-pickup", line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4, unit_price_cents = 30000, description = "Pale Ale 1/2 BBL keg" },
    { sku = "FP-IPA-1-6-BBL", qty = 8, unit_price_cents = 15000, description = "IPA 1/6 BBL keg" },
] }

[[job_kind.step]]
title = "invoice"
kind = "billing"
ready_when = "steps.deliver.done"
title_template = "Invoice"
authority_role = "bookkeeper"
# Default line items + StepType-required fields so
# commerce.invoice.issue has something to emit AND the
# layer-1 JobKind lint sees the contract satisfied. The
# handler computes amount_cents from line_items, but the
# StepType lists account_id / amount_cents / currency as
# required for the UI/admin path. Per-Job derivation is the
# faker hook (#33).
# #105 — billing line_items now carry sku + qty so the
# `invoice_issued` posting rule emits matching COGS lines in the
# same JE. Commerce HTTP handler decrements FG on_hand + stamps
# the cost basis in the same tx as the invoice insert. The
# shipment step's `consumes_products` array is no longer
# load-bearing for COGS — billing is the single source of truth.
metadata_defaults = { account_id = "{subject.id}", amount_cents = 285000, currency = "USD", line_items = [
    { sku = "FP-PALE-1-2-BBL", qty = 4, amount_cents = 120000, revenue_category = "wholesale", description = "Pale Ale 1/2 BBL × 4" },
    { sku = "FP-IPA-1-6-BBL", qty = 8, amount_cents = 120000, revenue_category = "wholesale", description = "IPA 1/6 BBL × 8" },
    { sku = "FP-STOUT-1-6-BBL", qty = 1, amount_cents = 15000, revenue_category = "wholesale", description = "Stout 1/6 BBL × 1" },
    { sku = "FP-LAGER-1-6-BBL", qty = 1, amount_cents = 15000, revenue_category = "wholesale", description = "Lager 1/6 BBL × 1" },
    { sku = "FP-HAZY-1-6-BBL", qty = 1, amount_cents = 15000, revenue_category = "wholesale", description = "Hazy IPA 1/6 BBL × 1" },
] }

[[job_kind.step]]
title = "delivered-invoiced"
kind = "outcome"
ready_when = "steps.invoice.done"
title_template = "Order delivered + invoiced"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

# The backorder branch of the stock-check gate — the order couldn't be
# covered from the cooler. Terminal (skipped) for now; a follow-up backorder
# Job that fulfills once stock returns is the next enhancement (see Q3 in
# docs/design/brewery-model-completeness.md). This is the release valve that
# keeps unfulfillable orders from lingering as open WIP.
[[job_kind.step]]
title = "backordered"
kind = "outcome"
ready_when = "steps.stock-check.done AND steps.stock-check.metadata.outcome = \"backorder\""
title_template = "Backordered — insufficient finished-goods stock"
terminal = { outcome = "skipped" }
metadata_defaults = { outcome_kind = "skipped" }

# ---------------------------------------------------------------------------
# Seasonal release — limited-run beer launch (collab, firkin, barrel
# program, holiday seasonal).
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "seasonal-release"
label = "Seasonal Release"
category = "sales"
subject_kinds = ["account"]
description = """
Limited-run beer launch — seasonal lineup, collab brews with another
brewery, firkin launches, barrel-aged programs. Subject is the
collab-account or campaign-anchor account. Recipe design + test
batch happen before the full batch is firm; production runs short
before the launch date.
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Head brewer proposes seasonal release"
metadata_defaults = { trigger_kind = "operator", trigger_name = "head-brewer-discretion" }

[[job_kind.step]]
title = "concept-brief"
kind = "order-intake"
ready_when = "steps.trigger.done"
title_template = "Concept brief — {subject.id}"
# `linked_systems` is the array of barrel asset_ids reserved for
# this release (e.g. ["SYS-BBL-BBN-003", "SYS-BBL-OAK-007"]).
# Empty for non-barrel-aged seasonals; a barrel-aged release
# fills it in at the concept-brief step so downstream tasting +
# packaging tiers know which vessels are committed.
metadata_defaults = { release_date = "", barrels_planned = 0, style = "", linked_systems = [] }

[[job_kind.step]]
title = "schedule-recipe"
kind = "scheduling"
ready_when = "steps.concept-brief.done"
authority_role = "senior-brewer"
title_template = "Schedule recipe session"

[[job_kind.step]]
title = "recipe-design"
kind = "task"
ready_when = "steps.schedule-recipe.done"
title_template = "Recipe design"
authority_role = "head-brewer"

[[job_kind.step]]
title = "test-batch"
kind = "task"
ready_when = "steps.recipe-design.done"
title_template = "Test batch (pilot system)"
authority_role = "lab-tech"

[[job_kind.step]]
title = "tasting-signoff"
kind = "sign-off"
ready_when = "steps.test-batch.done"
title_template = "Tasting sign-off"
authority_role = "head-brewer"
sign_offs_required = ["head-brewer"]

[[job_kind.step]]
title = "brew-full-batch"
kind = "production-consume"
ready_when = "steps.tasting-signoff.done"
authority_role = "brewer"
title_template = "Brew full batch (mash in — drain ingredients)"
# Raw drawdown for the seasonal full batch. Like morning-brew's
# mash-in, this debits 1310 WIP at each SKU's real inventory
# avg_cost via the `inventory.parts.consume` side effect, and the
# package step's `products.produce` reads these same rows to derive
# the FG cost basis — so WIP gets the raw materials it later
# transfers to FG, and COGS stays BOM-driven (no hard-coded plug).
# Pre-2026-06 this was a bare `task` with no consume: the package
# step produced FG (CR 1310) with a hard-coded unit_cost_cents and
# nothing ever debited 1310, so every seasonal release drained WIP
# by the full FG value (a systematic negative-WIP imbalance).
#
# Sized for a ~4-BBL specialty bottled batch (50 cases × 24×12oz ≈
# 3.6 BBL finished). Seasonals run higher-gravity + heavier-hopped
# than the house kegged beers, so grain/hops per BBL skew up. Every
# raw input lives in `ingredients_consumed` (the consume handler
# drains exactly one array — keeping CO2 here, not in a sibling
# `parts_consumed`, ensures it is both consumed AND counted into the
# derived FG cost, preserving WIP symmetry):
#   8×$25 2-row + 3×$30 Munich + 2×$300 Cascade (dry-hop) +
#   1×$15 yeast + 1×$25 CO2 = $930 → $18.60/case derived FG cost
#   (50 × 1860¢ = 93,000¢ = the BOM total exactly, so the WIP→FG
#   credit equals the raw→WIP debit and 1310 nets to zero).
metadata_defaults = { mash_temp_f = 150, mash_minutes = 75, ingredients_consumed = [
    { part_sku = "ING-MALT-2ROW-50", qty = 8 },
    { part_sku = "ING-MALT-MUNICH-50", qty = 3 },
    { part_sku = "ING-HOPS-CASCADE-44", qty = 2 },
    { part_sku = "ING-YEAST-CALI-1L", qty = 1 },
    { part_sku = "PKG-CO2-50LB", qty = 1 },
] }

[[job_kind.step]]
title = "package"
kind = "production-produce"
ready_when = "steps.brew-full-batch.done"
title_template = "Package (kegs / cans / bottles)"
authority_role = "packaging-tech"
# Default seasonal-release output: 50 cases of 24×12oz bottles.
# A typical seasonal run is ~4 BBL, packaged heavier into bottles
# (vs kegs) for retail distribution. The products.produce side
# effect fires on done and refills FP-SEASONAL-12OZ-CS at the
# brewhouse.
#
# FG cost basis is DERIVED at runtime by products.produce from this
# brew's real consumed inputs (the brew-full-batch
# `ingredients_consumed` above, each at its real inventory avg_cost)
# — matching the WIP that step debited, so 1310 nets to zero per
# release instead of draining. COGS therefore comes from real
# purchases, not a percentage-of-price plug. `unit_cost_cents` is
# only a fallback if the real cost can't be resolved; it matches the
# $18.60/case the BOM derives ($930 ÷ 50 cases).
metadata_defaults = { batch_id = "", excise_bbl = 4, produces_products = [
    { sku = "FP-SEASONAL-12OZ-CS", qty = 50, location_id = "loc-brewery-brewhouse", unit_cost_cents = 1860 },
] }

[[job_kind.step]]
title = "launch-announcement"
kind = "outreach"
ready_when = "steps.package.done"
title_template = "Launch announcement"

[[job_kind.step]]
title = "release-day"
kind = "milestone"
ready_when = "steps.launch-announcement.done"
title_template = "Release day"

# Allocation shipment — consumes the produced FP-SEASONAL cases so
# Physical allocation shipment — tracks the ship-out date but
# no longer drives COGS (#105 moved that to billing). Kept for
# operational tracking + the existing scan/courier counterparty
# chain.
[[job_kind.step]]
title = "allocate-cases"
kind = "shipment"
ready_when = "steps.release-day.done"
title_template = "Allocate cases — {subject.id}"
authority_role = "shipping-clerk"
metadata_defaults = { direction = "outbound", origin = "loc-brewery-brewhouse", destination = "{subject.id}", carrier = "freight", line_items = [
    { sku = "FP-SEASONAL-12OZ-CS", qty = 50, unit_price_cents = 17000, description = "Seasonal release allocation" },
] }

[[job_kind.step]]
title = "final-invoice"
kind = "billing"
ready_when = "steps.allocate-cases.done"
title_template = "Final invoice"
authority_role = "bookkeeper"
# Default line items so commerce.invoice.issue emits a real
# Invoice on step.done. Billing line carries sku + qty so
# the `invoice_issued` posting rule (post-#105) draws matching
# COGS in the same JE — revenue + FG drawdown are siamese.
metadata_defaults = { account_id = "{subject.id}", amount_cents = 850000, currency = "USD", line_items = [
    { sku = "FP-SEASONAL-12OZ-CS", qty = 50, amount_cents = 850000, revenue_category = "event-package", description = "Seasonal release allocation" },
] }

[[job_kind.step]]
title = "launched-shipped"
kind = "outcome"
ready_when = "steps.final-invoice.done"
title_template = "Seasonal launched + shipped"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

# ---------------------------------------------------------------------------
# Ingredient restock — periodic supplier order. Subject is Vendor.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "ingredient-restock"
label = "Ingredient Restock"
category = "procurement"
subject_kinds = ["vendor"]
description = """
Periodic order to a supplier (grain mill, hops yard, yeast bank,
adjuncts, packaging). Subject is the Vendor; line items go in
metadata. Receiving / put-away closes the loop.
"""

[[job_kind.step]]
title = "trigger"
kind = "trigger"
ready_when = "true"
title_template = "Stock fell below reorder point — restock signal"
metadata_defaults = { trigger_kind = "event", trigger_name = "inventory-reorder-threshold" }

# Second trigger — proactive planning. A periodic reorder check that
# pre-buys against estimated demand (a forecast window + safety stock),
# the way a real brewery plans ahead instead of only reacting to a
# threshold breach. Both triggers converge on `audit-stock`: a restock
# Job can be initiated reactively (the threshold trigger above) or
# proactively (this forecast check), and either path runs the same
# audit → order → receive → bill flow.
[[job_kind.step]]
title = "reorder-check"
kind = "trigger"
ready_when = "true"
title_template = "Scheduled reorder check — pre-buy on {subject.id} demand forecast"
metadata_defaults = { trigger_kind = "periodic", trigger_name = "demand-forecast-reorder", forecast_window_days = 30, safety_stock_days = 14 }

[[job_kind.step]]
title = "audit-stock"
kind = "task"
ready_when = "steps.trigger.done OR steps.reorder-check.done"
title_template = "Audit on-hand stock"
authority_role = "head-brewer"

[[job_kind.step]]
title = "place-order"
kind = "procurement"
ready_when = "steps.audit-stock.done"
title_template = "Place order — {subject.id}"
# po_id is shared with the bill-approval step so the vendor
# invoice's po_id FK lines up with the PO this step creates.
# `inventory.po.place` (StepType-level side effect) reads this
# on step.done and POSTs the PurchaseOrder to inventory.
# po_id stamped with {day} so every ingredient-restock Job mints
# a unique PO id; pre-fix every Job for a given vendor reused
# "PO-{subject.id}" and the upsert collapsed 541 events into 10
# rows (#143 finding). bill-approval step picks up the
# same template so the vendor_invoice.po_id FK still resolves.
metadata_defaults = { po_id = "PO-{subject.id}-{day}", items = [
    { part_sku = "{metadata.part_sku}" },
] }

[[job_kind.step]]
title = "inbound-shipment"
kind = "shipment"
ready_when = "steps.place-order.done"
title_template = "Inbound shipment from {subject.id}"
# Vendor ASN → in-transit → arrived-at-dock. The shipment
# StepType's side effect (`shipping.create`) drops a row into
# `boss-shipping` so the dock has a tracker before pallets
# arrive. Receiving (next tier) closes against the same PO.
metadata_defaults = { direction = "inbound", origin = "{subject.id}", destination = "brewery-dock", carrier = "freight", tracking_number = "", items = [] }

[[job_kind.step]]
title = "receive-delivery"
kind = "receiving"
ready_when = "steps.inbound-shipment.done"
title_template = "Receive delivery"
# Receiving clerk confirms via the receiving step itself
# (which fires inventory.receive on completion). No exec
# sign-off required in real brewery ops — that gate was
# wrong and was leaving every ingredient-restock job stuck
# at pending-sign-off.
# Step.done refills inventory via `inventory.receive`. v1 ships
# uniform receipt qtys across all 5 brewery SKUs since the
# brewery has no vendor-product catalog yet — every vendor's
# delivery looks the same. Per-vendor catalog mapping is the
# faker hook (#33).
# unit_cost_cents on each line carries the receive cost into
# inventory_items.avg_cost_cents (weighted moving average per
# receive). The PartsConsumeEmitter reads avg_cost_cents at
# consume time and the inventory adapter posts the matching
# `finance.cogs.recognized` JE in the same tx — that's how
# raw-ingredient COGS flows through the GL precisely.
#
# Receive qtys are sized to match consumption: at 1.2 brews/day
# × 12 unit-receipts/brew = 14 unit-receipts/day consumed. One
# restock delivers ~26 unit-receipts. At the brewery's restock
# cadence (~3 restocks/day across 10 vendors with ~20% reaching
# bill-approval), supply ≈ demand over the year — so 1300
# Inventory hovers around its initial pre-seed value instead of
# climbing or going negative.
# #103 — restock qtys per line raised to match the parts.toml
# reorder_qty values (was 40/10/5/5/5, now 40/10/15/5/5) so cascade
# hops keeps up with the brewery's ~3 hops/day burn rate. Pre-#103
# the seed delivered only 5 hops per restock while brews consumed
# 2-3 per day — net deficit drained inventory to ~0 over weeks.
# Per-SKU restock: receive only the triggering ingredient. The reorder
# rule passes its part_sku in Job metadata; the inventory.receive handler
# derives qty + unit_cost from the live inventory item (its current
# reorder_qty + avg_cost), so each restock buys one ingredient — not the
# whole catalog (which over-bought ~$44M of raw against ~$1M consumed).
metadata_defaults = { po_id = "PO-{subject.id}-{day}", expected_items = [
    { part_sku = "{metadata.part_sku}" },
] }

[[job_kind.step]]
title = "put-away"
kind = "task"
ready_when = "steps.receive-delivery.done"
title_template = "Put-away to grain bin / hop freezer / yeast cooler"
# Warehouse owns put-away; without a role the step strands (the
# dispatcher leaves no-role tasks for an operator the sim never plays),
# which left restocks open forever and drained raw malt to dead-letters.
authority_role = "warehouse-lead"

[[job_kind.step]]
title = "approve-bill"
kind = "bill-approval"
ready_when = "steps.put-away.done"
title_template = "Approve vendor bill — {subject.id}"
authority_role = "bookkeeper"
# Default amount so inventory.bill.approve emits a vendor
# invoice on step.done. Per-Job derivation (from the
# procurement step's PO line totals) is the faker hook in #33;
# v1 ships a deterministic single-line rollup so the dispatch
# chain emits real bills.
# `lines` is the source of truth — the `bill_approved` posting rule sums
# qty×unit_cost over them. Per-SKU restock: bill only the triggering
# ingredient. amount_cents is omitted; the inventory.bill.approve handler
# derives qty + unit_cost from the live inventory item and sums the single
# line, mirroring what the receive step actually received.
metadata_defaults = { po_id = "PO-{subject.id}-{day}", currency = "USD", lines = [
    { part_sku = "{metadata.part_sku}" },
] }

[[job_kind.step]]
title = "restock-completed"
kind = "outcome"
ready_when = "steps.approve-bill.done"
title_template = "Restock received + bill approved"
terminal = { outcome = "completed" }
metadata_defaults = { outcome_kind = "completed" }

