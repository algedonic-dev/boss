# Bulletins seeded into the /content surface. Loaded by the
# brewery prepare step (`boss-brewery-sim prepare`) via the
# public API. These appear as top-of-page announcements on a
# fresh playground deploy.

[[bulletin]]
title = "Welcome to BOSS Brewery — operator playground"
body = "This deployment is the public BOSS Brewery tenant. Every Job, invoice, shipment, and audit_log entry is generated by the brewery-engine simulator. Treat it as a live-fire training environment."

[[bulletin]]
title = "Brewing day moves to 06:30 starts"
body = "Effective next Monday, the morning brew JobKind anchors at 06:30 instead of 07:00 to make room for the new wholesale loadout window. Cellar handoff stays at 14:00."

[[bulletin]]
title = "Q3 sales-tax filing window"
body = "Quarterly sales-tax filings open July 1 and close July 25. The brewery-batch periodic emits one Job per legal entity automatically; no manual action needed unless you see a yellow row on the QA dashboard."
