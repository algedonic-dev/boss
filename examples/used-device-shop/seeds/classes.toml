# Class registry seeds for the used-device-shop example tenant.
#
# Each [[class]] block is one row of the `classes` table. Same shape
# as brewery's classes.toml — see that file's header for the schema.
#
# This file carries the asset category taxonomy
# (`subject_kind='asset', member_attribute='category'`) — the
# device categories this tenant refurbishes, covering the
# networking-gear refurb domain it ships.
#
# Adding a new category for this tenant is one row. Deactivating
# (without losing history) sets `retired_at = TIMESTAMPTZ`.

# ---------------------------------------------------------------------------
# System — Categories (the equipment kinds this tenant refurbishes)
# ---------------------------------------------------------------------------

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "router"
display_name = "Router"
sort_order = 10

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "switch"
display_name = "Switch"
sort_order = 20

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "firewall"
display_name = "Firewall"
sort_order = 30

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "wap"
display_name = "Wireless Access Point"
sort_order = 40

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "optical"
display_name = "Optical Transport"
sort_order = 50

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "transceiver"
display_name = "Transceiver / SFP"
sort_order = 60

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "psu"
display_name = "Power Supply / UPS"
sort_order = 70

[[class]]
subject_kind = "asset"
member_attribute = "category"
code = "rack-accessory"
display_name = "Rack Accessory"
sort_order = 80

