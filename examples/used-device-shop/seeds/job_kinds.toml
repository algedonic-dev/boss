# vendor-onboarding — procurement vendor admit. Custom multi-tier
# flow per examples/used-device-shop/design/procurement-team-needs.md.
[[job_kind]]
kind = "vendor-onboarding"
label = "Vendor Onboarding"
category = "procurement"
subject_kinds = ["vendor"]
description = """
Procurement vendor admit. W9 + COI on file → credit + category
checks → procurement manager approval → first PO → flip to
approved.
"""

# W9 + COI are parallel openers (both ready_when = "true", both
# triggers). The credit + category checks gate on BOTH so neither
# doc is a dead-end leaf.
[[job_kind.step]]
title = "w9-on-file"
kind = "document"
ready_when = "true"
title_template = "W9 on file"
authority_role = "parts-buyer"
metadata_defaults = { doc_type = "w9", title = "Vendor W9" }

[[job_kind.step]]
title = "coi-on-file"
kind = "document"
ready_when = "true"
title_template = "Certificate of insurance on file"
authority_role = "parts-buyer"
metadata_defaults = { doc_type = "coi", title = "Vendor COI" }

[[job_kind.step]]
title = "credit-check"
kind = "checklist"
ready_when = "steps.w9-on-file.done AND steps.coi-on-file.done"
title_template = "Credit reference check"
authority_role = "parts-buyer"
metadata_defaults = { items = [
    { label = "D&B / credit report pulled", checked = false },
    { label = "Three references confirmed", checked = false },
] }

[[job_kind.step]]
title = "category-tier"
kind = "checklist"
ready_when = "steps.w9-on-file.done AND steps.coi-on-file.done"
title_template = "Category + tier assignment"
authority_role = "parts-buyer"
metadata_defaults = { items = [
    { label = "Category assigned", checked = false },
    { label = "Tier assigned (preferred / approved / restricted)", checked = false },
] }

[[job_kind.step]]
title = "procurement-approval"
kind = "sign-off"
ready_when = "steps.credit-check.done AND steps.category-tier.done"
title_template = "Procurement manager approval"
authority_role = "warehouse-mgr"
sign_offs_required = ["warehouse-mgr"]
metadata_defaults = { authority_role = "warehouse-mgr" }

[[job_kind.step]]
title = "first-po"
kind = "task"
ready_when = "steps.procurement-approval.done"
title_template = "First PO issued + received"
authority_role = "parts-buyer"
metadata_defaults = { category = "first-po-trial" }

[[job_kind.step]]
title = "flip-approved"
kind = "handoff"
ready_when = "steps.first-po.done"
title_template = "Flip vendor to approved"
authority_role = "warehouse-mgr"
terminal = { outcome = "approved" }
metadata_defaults = { from_id = "onboarding", to_id = "approved-vendors" }

# vendor-negotiation — structured negotiation rounds.
[[job_kind]]
kind = "vendor-negotiation"
label = "Vendor Negotiation"
category = "procurement"
subject_kinds = ["vendor"]
description = """
Structured vendor negotiation. Open dialogue → record rounds
→ over-threshold approval → close-out → capture artifact.
"""

[[job_kind.step]]
title = "open-dialogue"
kind = "outreach"
ready_when = "true"
title_template = "Open dialogue with vendor"
authority_role = "parts-buyer"
metadata_defaults = { channel = "email", recipient_id = "{subject.id}", recipient_type = "vendor" }

[[job_kind.step]]
title = "record-round"
kind = "task"
ready_when = "steps.open-dialogue.done"
title_template = "Record round + vendor position"
authority_role = "parts-buyer"
# Single-use vocabulary authors its fields inline.
fields = [
  { name = "round_number", field_type = "integer", required = true },
  { name = "our_ask_md", field_type = "string" },
  { name = "vendor_position_md", field_type = "string" },
]
metadata_defaults = { round_number = 1, our_ask_md = "", vendor_position_md = "" }

[[job_kind.step]]
title = "internal-approval"
kind = "sign-off"
ready_when = "steps.record-round.done"
title_template = "Internal approval (over threshold)"
authority_role = "warehouse-mgr"
sign_offs_required = ["warehouse-mgr"]
metadata_defaults = { decision = "pending", threshold_cents = 0 }

[[job_kind.step]]
title = "close-out"
kind = "sign-off"
ready_when = "steps.internal-approval.done"
title_template = "Close-out (accept / reject / drop)"
authority_role = "warehouse-mgr"
sign_offs_required = ["warehouse-mgr"]
metadata_defaults = { authority_role = "warehouse-mgr" }

[[job_kind.step]]
title = "capture-artifact"
kind = "document"
ready_when = "steps.close-out.done"
title_template = "Capture outcome artifact"
authority_role = "parts-buyer"
terminal = { outcome = "completed" }
metadata_defaults = { doc_type = "negotiation-outcome", title = "Negotiation outcome" }

# rfq — request-for-quote across multiple vendors.
