# JobKind rows for the Used Device Shop tenant.
#
# Each [[job_kind]] block authors one row of the `job_kinds` table.
# Schema mirrors `JobKindSpec` in
# crates/core/boss-jobs/src/registry.rs — the loader at
# crates/core/boss-jobs/src/seed_loader.rs serializes these straight into
# the row.
#
# Step DAGs use existing StepTypes from
# crates/core/boss-jobs/src/step_registry.rs — the existing catalog
# covers the device-refurb vertical the same way it covers the
# brewery, so this bundle adds no new step kinds.
#
# Authority roles reference the employee Roles seeded in
# examples/used-device-shop/data/employees.json — `qa-tech`,
# `qa-lead`, `refurb-tech`, `refurb-supervisor`, `service-tech`,
# `service-mgr`, `support-specialist`, `sales-rep`, `sales-mgr`,
# `warehouse-clerk`, `warehouse-mgr`, `parts-buyer`, etc.
#
# The boss-sim shape-driven path reads these rows + tenant.toml to
# drive the tenant's work; each JobKind here is one bounded unit of
# the device-refurb business modeled as data.

# ---------------------------------------------------------------------------
# device-intake — physical receipt of a unit (used trade-in, buyback,
# returned-lease, OEM-new). Subject is the freshly-assigned system.
#
# Three-step graph mirrors the actual receiving-tech workflow:
# evaluate condition → decide disposition (refurb / dispose / RMA back
# to source) → record the formal intake. The decide step's `quote`
# kind is a stretch — the StepType is account-billing-shaped — but
# it carries the per-unit valuation we need at that stage and avoids
# minting yet another StepType.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "device-intake"
label = "Device Intake"
category = "operations"
subject_kinds = ["asset"]
description = """
Physical-unit intake — log the arrival of a system, evaluate
condition, decide disposition, then bind it to a downstream refurb
or disposal lineage. Subject is the system id assigned at intake.
"""

# Trigger — the intake-condition inspection is the opening step
# (fires at Job open).
[[job_kind.step]]
title = "evaluate-condition"
kind = "inspection"
ready_when = "true"
title_template = "Evaluate intake condition — {subject.id}"
authority_role = "warehouse-clerk"
metadata_defaults = { overall_result = "pass", inspector_notes = "", measurements = [] }

# FORK POINT — the disposition decision routes the unit to the
# repair lineage or the salvage lineage. Discriminates on the
# `disposition` metadata field ("repair" / "salvage").
#
# GOTCHA: this fork discriminates on the free-text
# `quote.disposition` metadata field (the `quote` StepType declares
# no `disposition` enum). The two real branches gate on
# `= "repair"` / `= "salvage"`; the `disposition-other` terminal is
# the wildcard fallback for a free-text discriminator
# (ready_when = bare `steps.decide-disposition.done`). That bare-done
# fallback is also satisfied on the repair/salvage paths, so at
# runtime it co-fires with the chosen branch. Fully
# semantically-exclusive coverage would require promoting
# `quote.disposition` (or a dedicated `intake.outcome`) to a declared
# enum `repair|salvage|totaled` on the StepType so the branches are
# exhaustive and no bare-done fallback is needed.
[[job_kind.step]]
title = "decide-disposition"
kind = "quote"
ready_when = "steps.evaluate-condition.done"
title_template = "Decide disposition — {subject.id}"
authority_role = "refurb-supervisor"
# `account_id` is a stretch — there's no buyer at intake. We use the
# vendor / source id (or the catch-all `acc-intake-bench`) to satisfy
# the StepType's required field. line_items carries the per-unit
# valuation the disposition decision rests on. `disposition` carries
# the fork discriminator ("repair" / "salvage"), set at done time.
metadata_defaults = { account_id = "acc-intake-bench", line_items = [], total_cents = 0, currency = "USD", disposition = "" }

# Repair branch — bind the unit to the refurb lineage.
[[job_kind.step]]
title = "record-intake"
kind = "intake"
ready_when = "steps.decide-disposition.done AND steps.decide-disposition.metadata.disposition = \"repair\""
title_template = "Record intake — {subject.id}"
authority_role = "warehouse-clerk"
# Required-at-done by the intake StepType: asset_id. Operators
# overlay oem_serial / source / condition_notes / bin at done time.
terminal = { outcome = "intake-recorded" }
metadata_defaults = { asset_id = "{subject.id}", source = "used-trade-in" }

# Salvage branch — route the unit to the salvage/decommission lineage.
[[job_kind.step]]
title = "record-salvage"
kind = "intake"
ready_when = "steps.decide-disposition.done AND steps.decide-disposition.metadata.disposition = \"salvage\""
title_template = "Record salvage disposition — {subject.id}"
authority_role = "warehouse-clerk"
terminal = { outcome = "salvaged" }
metadata_defaults = { asset_id = "{subject.id}", source = "used-trade-in" }

# Wildcard fallback terminal — catches any disposition value not
# covered by the repair / salvage branches so no outcome dead-ends.
[[job_kind.step]]
title = "disposition-other"
kind = "intake"
ready_when = "steps.decide-disposition.done"
title_template = "Record other disposition — {subject.id}"
authority_role = "warehouse-clerk"
terminal = { outcome = "other-disposition" }
metadata_defaults = { asset_id = "{subject.id}", source = "used-trade-in" }

# ---------------------------------------------------------------------------
# refurb-used — the full triage → repair → QA path for a used unit.
#
# Step graph: handoff → inspection+checklist → repair →
# inspection → sign-off → handoff. A tenant-owned JobKind — refurb
# is the device shop's vertical, not platform vocabulary.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "refurb-used"
label = "Refurb (used)"
category = "refurb"
subject_kinds = ["asset"]
description = """
Full refurb pipeline for a used / trade-in / returned-lease unit:
intake → triage → repair → QA → certification → put-away. OEM-new
units take the shorter `refurb-oem-new` path which skips triage +
repair.
"""

[[job_kind.step]]
title = "intake-log"
kind = "handoff"
ready_when = "true"
title_template = "Intake & log — {subject.id}"
authority_role = "warehouse-clerk"
metadata_defaults = { from_id = "receiving", to_id = "refurb-queue" }

# Triage + parts-check run in parallel off the intake handoff (both
# gate on `steps.intake-log.done`). The repair step gates on BOTH so
# neither parallel step is a dead-end leaf.
[[job_kind.step]]
title = "triage"
kind = "inspection"
ready_when = "steps.intake-log.done"
title_template = "Triage assessment — {subject.id}"
authority_role = "refurb-tech"
metadata_defaults = { asset_id = "{subject.id}", overall_result = "pass" }

[[job_kind.step]]
title = "check-parts"
kind = "checklist"
ready_when = "steps.intake-log.done"
title_template = "Check parts inventory"
authority_role = "refurb-tech"
metadata_defaults = { items = [
    { label = "Cooling module in stock", checked = false },
    { label = "Transceivers available", checked = false },
    { label = "Power supply spares on hand", checked = false },
] }

[[job_kind.step]]
title = "diagnose-repair"
kind = "repair"
ready_when = "steps.triage.done AND steps.check-parts.done"
title_template = "Diagnose & repair — {subject.id}"
authority_role = "refurb-tech"
# parts_consumed left empty by default; the refurb tech overlays
# real SKUs at done time. The repair StepType's
# inventory.parts.consume side-effect no-ops on empty arrays.
metadata_defaults = { asset_id = "{subject.id}", parts_consumed = [], labor_hours = 0 }

[[job_kind.step]]
title = "qa-inspection"
kind = "inspection"
ready_when = "steps.diagnose-repair.done"
title_template = "QA inspection — {subject.id}"
authority_role = "qa-tech"
sign_offs_required = ["qa-tech"]
metadata_defaults = { asset_id = "{subject.id}", overall_result = "pass" }

[[job_kind.step]]
title = "qa-certification"
kind = "sign-off"
ready_when = "steps.qa-inspection.done"
title_template = "QA certification — {subject.id}"
authority_role = "qa-lead"
sign_offs_required = ["qa-lead"]
metadata_defaults = { authority_role = "qa-lead" }

[[job_kind.step]]
title = "put-away"
kind = "handoff"
ready_when = "steps.qa-certification.done"
title_template = "Put away to ready stock"
authority_role = "warehouse-clerk"
terminal = { outcome = "stocked" }
metadata_defaults = { from_id = "qa", to_id = "warehouse" }

# ---------------------------------------------------------------------------
# field-service — break/fix on a deployed unit at a customer site.
#
# Step graph: SR triage → diagnostic call → schedule dispatch →
# on-site repair → post-repair verification → customer sign-off.
# sr-triage + diagnostic-call are separate tiers per
# examples/used-device-shop/design/operations-needs.md D1+A1.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "field-service"
label = "Field Service"
category = "service"
subject_kinds = ["asset"]
description = """
Break-fix dispatch on a deployed unit. Subject is the failing system.
Step graph walks triage → diagnostic call → scheduling → on-site
repair → checklist verification → customer sign-off.
"""

[[job_kind.step]]
title = "triage-request"
kind = "sr-triage"
ready_when = "true"
title_template = "Triage request — {subject.id}"
authority_role = "service-mgr"
# Required-at-done: account_id, device_serial, failure_description,
# priority. Operators overlay these from the inbound contact.
metadata_defaults = { account_id = "", device_serial = "{subject.id}", failure_description = "", priority = "standard" }

[[job_kind.step]]
title = "diagnostic-call"
kind = "diagnostic-call"
ready_when = "steps.triage-request.done"
title_template = "Diagnostic call — {subject.id}"
authority_role = "service-tech"
metadata_defaults = { channel = "phone", attendees = [] }

[[job_kind.step]]
title = "schedule-dispatch"
kind = "scheduling"
ready_when = "steps.diagnostic-call.done"
title_template = "Schedule dispatch — {subject.id}"
authority_role = "service-mgr"
# Required-at-done by the scheduling StepType: location +
# scheduled_at. Default to a placeholder window; the dispatcher
# overlays the real slot.
metadata_defaults = { location = "", scheduled_at = "" }

[[job_kind.step]]
title = "on-site-repair"
kind = "repair"
ready_when = "steps.schedule-dispatch.done"
title_template = "On-site repair — {subject.id}"
authority_role = "service-tech"
metadata_defaults = { asset_id = "{subject.id}", parts_consumed = [], labor_hours = 0 }

[[job_kind.step]]
title = "post-repair-verification"
kind = "checklist"
ready_when = "steps.on-site-repair.done"
title_template = "Post-repair verification"
authority_role = "service-tech"
metadata_defaults = { items = [
    { label = "System powers on", checked = false },
    { label = "Self-test passes", checked = false },
    { label = "Customer-facing function verified", checked = false },
] }

[[job_kind.step]]
title = "customer-signoff"
kind = "sign-off"
ready_when = "steps.post-repair-verification.done"
title_template = "Customer sign-off"
authority_role = "service-mgr"
sign_offs_required = ["service-mgr"]
terminal = { outcome = "completed" }
metadata_defaults = { authority_role = "account-contact" }

# ---------------------------------------------------------------------------
# sale — convert a qualified opportunity into a shipped + invoiced
# system. Subject is the buying account.
#
# Step graph: qualify → demo+quote in parallel → close →
# ship+invoice in parallel. Each step carries the metadata it
# needs so a Job authored from this seed lands valid at done time
# without per-Job overrides.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "sale"
label = "Sale"
category = "sales"
subject_kinds = ["account"]
description = """
End-to-end sale Job. Subject is the account. Bundle deals (multiple
systems on one Job) carry the system list in metadata.asset_ids;
the shipment + billing steps fan that out into per-line entries.
"""

[[job_kind.step]]
title = "qualify-lead"
kind = "qualification"
ready_when = "true"
title_template = "Qualify lead — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { criteria = [], qualified = false }

# Demo + quote run in parallel off qualification (both gate on
# `steps.qualify-lead.done`). Close-deal gates on BOTH so neither
# parallel step is a dead-end leaf.
[[job_kind.step]]
title = "demo"
kind = "outreach"
ready_when = "steps.qualify-lead.done"
title_template = "Demo & presentation — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { channel = "demo", recipient_id = "{subject.id}", recipient_type = "account" }

[[job_kind.step]]
title = "send-quote"
kind = "quote"
ready_when = "steps.qualify-lead.done"
title_template = "Prepare & send quote — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { account_id = "{subject.id}", line_items = [], total_cents = 0, currency = "USD" }

[[job_kind.step]]
title = "close-deal"
kind = "sign-off"
ready_when = "steps.demo.done AND steps.send-quote.done"
title_template = "Close deal — {subject.id}"
authority_role = "sales-mgr"
sign_offs_required = ["sales-mgr"]
metadata_defaults = { decision = "pending" }

# Ship + invoice run in parallel off close-deal. Both are terminals
# (multiple terminals per JobKind is normal) — the Job closes once
# the unit ships and the invoice issues.
[[job_kind.step]]
title = "ship-to-account"
kind = "shipment"
ready_when = "steps.close-deal.done"
title_template = "Ship to account — {subject.id}"
authority_role = "warehouse-clerk"
# `line_items` carries the per-system rows the shipping projection
# needs (sku/qty/unit_price/description). Empty by default; the
# sale step's close handler overlays asset_ids → line_items.
# `consumes_products` left empty — the device-refurb tenant's
# inventory_items are tracked at the per-unit level, not as
# finished_product_inventory rows, so the products.consume
# side-effect no-ops here.
terminal = { outcome = "shipped" }
metadata_defaults = { direction = "outbound", origin = "warehouse", destination = "{subject.id}", carrier = "ups", line_items = [], consumes_products = [] }

[[job_kind.step]]
title = "issue-invoice"
kind = "billing"
ready_when = "steps.close-deal.done"
title_template = "Issue invoice — {subject.id}"
authority_role = "sales-mgr"
terminal = { outcome = "invoiced" }
metadata_defaults = { account_id = "{subject.id}", amount_cents = 0, currency = "USD", line_items = [] }

# ---------------------------------------------------------------------------
# support-incident — inbound customer issue worked by a support
# specialist. Subject is the requesting account.
#
# Covers the device-question / device-issue / account-question
# support lanes. RMA + SLA renewal are their own JobKinds below —
# those have meaningfully different step graphs and SLAs.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "support-incident"
label = "Support Incident"
category = "support"
subject_kinds = ["account"]
description = """
Inbound support case — phone / email / chat from a customer contact.
Subject is the account. Lifecycle: open → assigned → in-progress →
resolved with optional CSAT. Routing to RMA / SLA-renewal stays a
separate JobKind so each lane carries its own SLA + step graph.
"""

[[job_kind.step]]
title = "receive-case"
kind = "outreach"
ready_when = "true"
title_template = "Receive case — {subject.id}"
authority_role = "support-specialist"
metadata_defaults = { channel = "phone", recipient_id = "{subject.id}", recipient_type = "account", subject = "", body = "" }

[[job_kind.step]]
title = "triage-assign"
kind = "qualification"
ready_when = "steps.receive-case.done"
title_template = "Triage & assign"
authority_role = "support-specialist"
metadata_defaults = { criteria = [
    { name = "device-related", met = false, notes = "" },
    { name = "billing-related", met = false, notes = "" },
    { name = "training-request", met = false, notes = "" },
], qualified = true }

[[job_kind.step]]
title = "investigate-resolve"
kind = "task"
ready_when = "steps.triage-assign.done"
title_template = "Investigate & resolve"
authority_role = "support-specialist"
metadata_defaults = { category = "support-investigation", instructions = "", due_date = "" }

[[job_kind.step]]
title = "confirm-resolution"
kind = "acknowledgment"
ready_when = "steps.investigate-resolve.done"
title_template = "Confirm resolution + capture CSAT"
authority_role = "support-specialist"
terminal = { outcome = "resolved" }
# CSAT (1-5) lands in metadata.csat at done time. The
# acknowledgment StepType captures the document-acknowledgement
# contract; CSAT rides as a custom field which the unknown-field
# policy permits.
metadata_defaults = { document_title = "Resolution confirmation", csat = 0 }

# ---------------------------------------------------------------------------
# support-rma — return-materials-authorization workflow. Subject is
# the account; the unit being returned + replacement (if any) carried
# in metadata.
#
# A separate JobKind from support-incident because RMA
# fundamentally differs: a physical inbound shipment, a per-unit
# inspection, a credit/refund decision, a return shipment if the
# customer wants a replacement. Different SLA, different ownership
# chain (support → warehouse → refurb → finance).
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "support-rma"
label = "Support RMA"
category = "support"
subject_kinds = ["account"]
description = """
Return-materials-authorization workflow. Customer requests a return;
support approves; the unit comes inbound; warehouse receives + QA
inspects; finance issues a refund or credit (or a replacement Job
spawns separately). Subject is the account; the asset_id under
return rides in metadata.
"""

[[job_kind.step]]
title = "rma-request"
kind = "outreach"
ready_when = "true"
title_template = "RMA request from {subject.id}"
authority_role = "support-specialist"
metadata_defaults = { channel = "email", recipient_id = "{subject.id}", recipient_type = "account", subject = "RMA request", body = "" }

[[job_kind.step]]
title = "approve-rma"
kind = "sign-off"
ready_when = "steps.rma-request.done"
title_template = "Approve RMA"
authority_role = "service-mgr"
sign_offs_required = ["service-mgr"]
metadata_defaults = { decision = "pending", comment = "" }

[[job_kind.step]]
title = "receive-unit"
kind = "shipment"
ready_when = "steps.approve-rma.done"
title_template = "Receive returned unit"
authority_role = "warehouse-clerk"
metadata_defaults = { direction = "inbound", origin = "{subject.id}", destination = "warehouse", carrier = "ups", line_items = [], consumes_products = [] }

[[job_kind.step]]
title = "assess-unit"
kind = "inspection"
ready_when = "steps.receive-unit.done"
title_template = "Assess returned unit condition"
authority_role = "qa-tech"
metadata_defaults = { overall_result = "conditional", inspector_notes = "", measurements = [] }

[[job_kind.step]]
title = "refund-replace-decision"
kind = "sign-off"
ready_when = "steps.assess-unit.done"
title_template = "Refund / replace decision"
authority_role = "service-mgr"
sign_offs_required = ["service-mgr"]
metadata_defaults = { decision = "pending", comment = "" }

[[job_kind.step]]
title = "process-refund"
kind = "billing"
ready_when = "steps.refund-replace-decision.done"
title_template = "Process refund / credit memo"
authority_role = "sales-mgr"
terminal = { outcome = "resolved" }
metadata_defaults = { account_id = "{subject.id}", amount_cents = 0, currency = "USD", line_items = [] }

# ---------------------------------------------------------------------------
# support-sla-renewal — the support-side renewal workflow for an SLA
# coverage attached to one of the customer's deployed systems.
#
# Distinct from `service-agreement` (which is the *new* coverage
# Job spawned at install) and from `contract-renewal` (which is the
# generic post-sale renewal Job). This is the lane support owns:
# coverage is about to expire, support reaches out, customer agrees,
# finance issues the renewal invoice. Driven by a periodic
# counterparty trigger in tenant.toml once the engine swap lands.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "support-sla-renewal"
label = "Support SLA Renewal"
category = "support"
subject_kinds = ["account"]
description = """
Renew an expiring SLA / support contract. Support reaches out 60d
before expiry, negotiates terms (or accepts auto-renewal), issues a
fresh quote, customer signs, finance bills. Subject is the account;
the agreement_id rides in metadata.
"""

[[job_kind.step]]
title = "expiry-warning"
kind = "milestone"
ready_when = "true"
title_template = "60-day expiry warning — {subject.id}"
metadata_defaults = { milestone_name = "renewal-window-open", criteria = "agreement.end_date - 60d <= today" }

[[job_kind.step]]
title = "renewal-outreach"
kind = "outreach"
ready_when = "steps.expiry-warning.done"
title_template = "Renewal outreach — {subject.id}"
authority_role = "support-specialist"
metadata_defaults = { channel = "email", recipient_id = "{subject.id}", recipient_type = "account", subject = "Coverage renewal", body = "" }

[[job_kind.step]]
title = "renewal-quote"
kind = "quote"
ready_when = "steps.renewal-outreach.done"
title_template = "Renewal quote — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { account_id = "{subject.id}", line_items = [], total_cents = 0, currency = "USD" }

[[job_kind.step]]
title = "customer-signature"
kind = "sign-off"
ready_when = "steps.renewal-quote.done"
title_template = "Customer signature — {subject.id}"
authority_role = "sales-mgr"
sign_offs_required = ["sales-mgr"]
metadata_defaults = { decision = "pending" }

[[job_kind.step]]
title = "renewal-invoice"
kind = "billing"
ready_when = "steps.customer-signature.done"
title_template = "Issue renewal invoice — {subject.id}"
authority_role = "sales-mgr"
terminal = { outcome = "renewed" }
metadata_defaults = { account_id = "{subject.id}", amount_cents = 0, currency = "USD", line_items = [] }

# ---------------------------------------------------------------------------
# service-agreement — fresh coverage at install. Subject is the
# buying account.
#
# Opens fresh coverage when a system is installed. The post-sale
# renewal of an existing agreement is a separate JobKind
# (`contract-renewal`).
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "service-agreement"
label = "Service Agreement"
category = "sales"
subject_kinds = ["account"]
description = """
Define + sign coverage on freshly-installed system(s). Subject is
the account; asset_ids + agreement_type (full-service /
parts-only / pm-only / extended-warranty) ride in metadata.
The first-period invoice fires from the billing step on done.
"""

[[job_kind.step]]
title = "draft-agreement"
kind = "quote"
ready_when = "true"
title_template = "Draft agreement — {subject.id}"
authority_role = "sales-rep"
metadata_defaults = { account_id = "{subject.id}", line_items = [], total_cents = 0, currency = "USD" }

[[job_kind.step]]
title = "define-coverage"
kind = "task"
ready_when = "steps.draft-agreement.done"
title_template = "Define coverage scope"
authority_role = "sales-rep"
# Coverage shape carried in metadata: covers_parts / covers_labor
# / covers_travel / pm_visits / response_sla_hours are derived
# from the chosen agreement_type and land at done-overlay time.
metadata_defaults = { category = "coverage-scope", instructions = "Pick agreement_type (full-service / parts-only / pm-only / extended-warranty)" }

[[job_kind.step]]
title = "customer-signature"
kind = "sign-off"
ready_when = "steps.define-coverage.done"
title_template = "Customer signature — {subject.id}"
authority_role = "sales-mgr"
sign_offs_required = ["sales-mgr"]
metadata_defaults = { decision = "pending" }

[[job_kind.step]]
title = "first-period-invoice"
kind = "billing"
ready_when = "steps.customer-signature.done"
title_template = "First-period invoice — {subject.id}"
authority_role = "sales-mgr"
metadata_defaults = { account_id = "{subject.id}", amount_cents = 0, currency = "USD", line_items = [] }

[[job_kind.step]]
title = "coverage-active"
kind = "milestone"
ready_when = "steps.first-period-invoice.done"
title_template = "Coverage active"
terminal = { outcome = "active" }
metadata_defaults = { milestone_name = "coverage-active", criteria = "first invoice issued + customer signed" }

# ---------------------------------------------------------------------------
# decommission — end-of-life retirement of a deployed unit. Subject
# is the system being decommissioned.
#
# Three tiers: assess → harvest → dispose. Spawned when a deployed
# system crosses its end-of-life age threshold.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "decommission"
label = "Decommission"
category = "operations"
subject_kinds = ["asset"]
description = """
Retire a deployed system that's reached end-of-life or is beyond
economic repair. Three steps: assess salvageable parts, harvest
what's reusable, dispose of the remainder.
"""

[[job_kind.step]]
title = "assess-salvage"
kind = "inspection"
ready_when = "true"
title_template = "Assess salvageable parts — {subject.id}"
authority_role = "refurb-tech"
metadata_defaults = { asset_id = "{subject.id}", overall_result = "conditional", inspector_notes = "" }

[[job_kind.step]]
title = "harvest-parts"
kind = "task"
ready_when = "steps.assess-salvage.done"
title_template = "Harvest usable parts"
authority_role = "refurb-tech"
metadata_defaults = { category = "decommission-harvest", instructions = "Pull reusable transceivers / PSUs / fans into spares stock" }

[[job_kind.step]]
