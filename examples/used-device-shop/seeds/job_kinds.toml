# ---------------------------------------------------------------------------
# training-session — on-site operator training spawned at install.
# Subject is the account; asset_id rides in metadata.
#
# A dedicated JobKind so the training lifecycle (schedule →
# pre-reading → conduct → certify) is a first-class workflow rather
# than an install side-effect.
# ---------------------------------------------------------------------------

[[job_kind]]
kind = "training-session"
label = "Training Session"
category = "service"
subject_kinds = ["account"]
description = """
On-site operator training for newly-installed systems. Subject is
the account; asset_id (the unit being trained on) rides in
metadata. Default cadence is 7-14 days post-install.
"""

[[job_kind.step]]
title = "schedule-session"
kind = "scheduling"
ready_when = "true"
title_template = "Schedule training session — {subject.id}"
authority_role = "service-mgr"
metadata_defaults = { location = "{subject.id}", scheduled_at = "", duration_minutes = 240, attendees = [] }

[[job_kind.step]]
title = "send-pre-reading"
kind = "outreach"
ready_when = "steps.schedule-session.done"
title_template = "Send pre-reading + agenda"
authority_role = "service-tech"
metadata_defaults = { channel = "email", recipient_id = "{subject.id}", recipient_type = "account", subject = "Training session prep", body = "" }

[[job_kind.step]]
title = "conduct-training"
kind = "training"
ready_when = "steps.send-pre-reading.done"
title_template = "Conduct training — {subject.id}"
authority_role = "service-tech"
metadata_defaults = { course_name = "Operator orientation", provider = "in-house", passing_score = 80 }

[[job_kind.step]]
title = "operator-certification"
kind = "acknowledgment"
ready_when = "steps.conduct-training.done"
title_template = "Operator certification"
authority_role = "service-mgr"
terminal = { outcome = "completed" }
metadata_defaults = { document_title = "Operator competency acknowledgment" }
