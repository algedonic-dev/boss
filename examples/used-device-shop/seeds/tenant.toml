# Tenant config for the Used Device Shop — refurbishes + sells +
# services pre-owned networking gear. Sister file to the brewery's
# tenant.toml.
#
# Sections (matching crates/orchestrators/boss-sim/src/shape_driven/tenant.rs):
#
#   1. [meta]            — tenant identity + sim window + operating days
#   2. [modules]         — which platform surfaces are visible
#   3. [job_rates]       — JobKind creation rates (Poisson per day)
#   4. [subject_rates]   — Subject birth rates (account, asset, vendor)
#   5. [anomalies]       — per-JobKind anomaly probabilities
#   6. [[shock]]         — quarterly probabilistic disruptions
#   7. [counterparty.*]  — external actors (banks, couriers, suppliers,
#                          warranty timer, RMA inbound chain)
#   8. [periodic.*]      — calendar-driven cycles (bank sweep, tax)
#   9. [batch.*]         — population aggregations (payroll + taxes)
#
# Per the HumanWorker generator retirement step 5, this file fires
# the 10 JobKinds authored in `job_kinds.toml` at the rates the legacy
# generators encode (intake.rs / refurb.rs / sales.rs / service.rs /
# support.rs / contracts.rs / decommission.rs / training.rs). Once
# step 7's engine swap lands, the shape-driven path consumes these
# entries and the per-day generator chain in
# `crates/orchestrators/boss-sim/src/engine.rs::Sim::run` retires.
#
# Rate derivations come from `crates/orchestrators/boss-sim/src/config.rs`'s
# default `SimConfig`, the per-generator hand-tuned probabilities,
# and the support-tier weights in support.rs's
# `daily_open_probability`. Comments per block document the source.

[meta]
tenant_id = "used-device-shop"
display_name = "Used Device Shop"
seed = 0xcafebabe  # matches SimConfig::default().seed for reproducibility
start_date = "2024-01-02"
end_date = "2026-04-25"
# Refurb floor + warehouse run Mon-Fri; service techs cover Mon-Sat
# for on-site dispatches; support specialists cover every day. The
# shape-driven engine reads `operating_days` once for the tenant; the
# per-JobKind weekday/weekend multipliers below tilt individual
# flows for the kinds where that distinction matters (refurb only
# fires Mon-Fri via weekend_multiplier=0; support fires every day).
operating_days = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"]

# ---------------------------------------------------------------------------
# Messages — retention horizon for the messages_events trail.
# Same 90-day default the brewery uses; tenants in regulated
# industries should lengthen.
# ---------------------------------------------------------------------------

[messages]
events_retention_days = 90

# ---------------------------------------------------------------------------
# Labels — tenant vocabulary overrides. The platform default for the
# assets surface is the generic "Assets"/"asset"; this tenant's word
# for a tracked asset is "device".
# ---------------------------------------------------------------------------

[labels]
"nav.assets_label"       = "Devices"
"assets.page_title"      = "tracked devices"
"assets.entity_singular" = "device"
"assets.entity_plural"   = "devices"
"assets.empty_state"     = "No devices match."

# ---------------------------------------------------------------------------
# Modules — which platform surfaces this tenant uses.
# ---------------------------------------------------------------------------

[modules]
# Always-on for every tenant.
jobs        = true
people      = true
finance     = true
messages    = true
calendar    = true
qa          = true

# Used-device-shop relevant.
exec        = true
hr          = true
parts       = true   # spare parts for refurb + service
warehouse   = true   # intake + ready-stock + RMA returns
equipment   = true   # assets-as-Subject — the whole business
shipping    = true   # outbound sales + RMA inbound
support     = true   # support-incident / RMA / SLA-renewal lanes
marketing-assets = true  # marketing-motion lives in seed_kinds.rs today

# Used-device-shop does not yet ship.
shop        = false  # No DTC storefront — every sale flows through
                     # the sales rep + quote + close path
sim         = true
it          = true

# ---------------------------------------------------------------------------
# JobKind creation rates (jobs/day at steady state).
#
# Each entry mirrors a JobKind authored in
# examples/used-device-shop/seeds/job_kinds.toml. Rates are
# Poisson-sampled per day. Ramps grow the company over the sim
# window; weekday/weekend multipliers gate flows that don't run on
# weekends (refurb floor) vs. those that do (support).
# ---------------------------------------------------------------------------

# device-intake — physical receipt of a unit. Rate matches the
# legacy intake.rs generator's effective_intake_rate(): the default
# SimConfig ramps from 20/day at launch to 120/day in year 7.
# Refurb floor runs Mon-Fri, so weekend = 0.
[job_rates.device-intake]
rate = 20.0
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.device-intake.ramp]]
date = "2024-01-02"
rate = 20.0
[[job_rates.device-intake.ramp]]
date = "2024-07-01"
rate = 35.0
[[job_rates.device-intake.ramp]]
date = "2025-01-01"
rate = 60.0
[[job_rates.device-intake.ramp]]
date = "2025-07-01"
rate = 90.0

# refurb-used — the 85% of intake that follows the full
# triage → repair → QA path. SimConfig.new_device_ratio = 0.15 →
# refurb-used rate = intake_rate × 0.85. Tracks the device-intake
# ramp at 0.85× scale. Step 8's parity harness flagged this as
# 4.15x the legacy volume on a 30-day run (legacy=122, shape=508);
# the legacy engine drives refurb-used as a per-intake spawn whereas
# the shape-driven engine fires it independently via this rate. Set
# the launch rate to ~4.25 (legacy SimConfig.intake_rate=5 × 0.85)
# so the 30-day window matches; the ramp still climbs to match the
# device-intake growth curve at 0.85× scale.
[job_rates.refurb-used]
rate = 4.25
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.refurb-used.ramp]]
date = "2024-01-02"
rate = 4.25
[[job_rates.refurb-used.ramp]]
date = "2024-07-01"
rate = 30.0
[[job_rates.refurb-used.ramp]]
date = "2025-01-01"
rate = 51.0
[[job_rates.refurb-used.ramp]]
date = "2025-07-01"
rate = 76.0

# refurb-oem-new — the 15% of intake that's factory-sealed. Shorter
# step graph (skips triage + repair). Rate is intake × 0.15.
# Step 8's parity harness flagged the missing rate block —
# refurb-oem-new was authored in job_kinds.toml without a
# corresponding [job_rates.*] entry, so the shape-driven engine
# never fired it.
[job_rates.refurb-oem-new]
rate = 0.75  # legacy SimConfig.intake_rate=5 × 0.15
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.refurb-oem-new.ramp]]
date = "2024-01-02"
rate = 0.75
[[job_rates.refurb-oem-new.ramp]]
date = "2024-07-01"
rate = 5.25
[[job_rates.refurb-oem-new.ramp]]
date = "2025-01-01"
rate = 9.0
[[job_rates.refurb-oem-new.ramp]]
date = "2025-07-01"
rate = 13.5

# receiving — per-asset intake artifact Job. The legacy intake.rs
# emits one per intake event as a retrospective record of "the unit
# arrived." Same rate as device-intake since it's 1:1 with intake.
# Step 8 parity harness flagged the missing block.
[job_rates.receiving]
rate = 5.0  # legacy SimConfig.intake_rate
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.receiving.ramp]]
date = "2024-01-02"
rate = 5.0
[[job_rates.receiving.ramp]]
date = "2024-07-01"
rate = 35.0
[[job_rates.receiving.ramp]]
date = "2025-01-01"
rate = 60.0
[[job_rates.receiving.ramp]]
date = "2025-07-01"
rate = 90.0

# account-onboarding — post-sale CS handoff. The legacy sales.rs
# spawns one per sale Job; once on_complete_create triggers wire
# through the shape-driven engine, this rate retires in favor of
# a sale → account-onboarding trigger (the JobKindSpec.on_complete_create
# data shape is already there per `[GAP 5]` in the brewery
# tenant.toml). Until then, fire independently at 1:1 with sale
# so the post-sale CS lane is visible.
[job_rates.account-onboarding]
rate = 1.0
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.account-onboarding.ramp]]
date = "2024-01-02"
rate = 1.0
[[job_rates.account-onboarding.ramp]]
date = "2024-07-01"
rate = 2.5
[[job_rates.account-onboarding.ramp]]
date = "2025-01-01"
rate = 4.0
[[job_rates.account-onboarding.ramp]]
date = "2025-07-01"
rate = 5.0

# field-service — break-fix dispatches on deployed units. Failure
# rate derivation from service.rs:
#   daily_lambda = (avg_afr × failure_rate_multiplier × installed) / 365
# At steady state ~12,500 installed × ~0.10 AFR / 365 = ~3.4/day.
# Service techs cover Mon-Sat (weekend reduced but not zero — bigger
# accounts call for Saturday emergency dispatches).
[job_rates.field-service]
rate = 3.5
weekday_multiplier = 1.2
weekend_multiplier = 0.4
[[job_rates.field-service.ramp]]
date = "2024-01-02"
rate = 0.5  # fleet is tiny at launch
[[job_rates.field-service.ramp]]
date = "2024-07-01"
rate = 1.5
[[job_rates.field-service.ramp]]
date = "2025-01-01"
rate = 2.5
[[job_rates.field-service.ramp]]
date = "2025-07-01"
rate = 3.5

# sale — ready devices matched to accounts. sales.rs derives
# matched/day from ready_devices × sales_match_rate (0.08). At
# steady state ~50 ready devices × 0.08 = ~4/day, plus bundle
# deals add another ~1/day. Sales reps cover Mon-Fri.
[job_rates.sale]
rate = 5.0
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.sale.ramp]]
date = "2024-01-02"
rate = 1.0
[[job_rates.sale.ramp]]
date = "2024-07-01"
rate = 2.5
[[job_rates.sale.ramp]]
date = "2025-01-01"
rate = 4.0
[[job_rates.sale.ramp]]
date = "2025-07-01"
rate = 5.0

# support-incident — the device-question / device-issue / billing /
# training-request / account categories from support.rs. Per-account
# daily probabilities: platinum 0.020, gold 0.010, silver 0.005.
# 2500 accounts × ~0.011 weighted avg = ~27/day, minus the RMA +
# SLA-renewal lanes carved into separate JobKinds below.
# Support covers every day; weekend dampened.
[job_rates.support-incident]
rate = 22.0
weekday_multiplier = 1.15
weekend_multiplier = 0.6
[[job_rates.support-incident.ramp]]
date = "2024-01-02"
rate = 3.0
[[job_rates.support-incident.ramp]]
date = "2024-07-01"
rate = 8.0
[[job_rates.support-incident.ramp]]
date = "2025-01-01"
rate = 15.0
[[job_rates.support-incident.ramp]]
date = "2025-07-01"
rate = 22.0

# support-rma — return-materials-authorization workflow. ~10% of
# support-incident lands as an RMA per the implicit support.rs
# split (device-issue cases that escalate to "we want to send it
# back"). At steady state ~2-3/day.
[job_rates.support-rma]
rate = 2.5
weekday_multiplier = 1.3
weekend_multiplier = 0.2
[[job_rates.support-rma.ramp]]
date = "2024-01-02"
rate = 0.3
[[job_rates.support-rma.ramp]]
date = "2024-07-01"
rate = 1.0
[[job_rates.support-rma.ramp]]
date = "2025-01-01"
rate = 1.8
[[job_rates.support-rma.ramp]]
date = "2025-07-01"
rate = 2.5

# support-sla-renewal — triggered by warranty-expiry counterparty
# (see [counterparty.warranty-expiry-nudge] below) so the rate here
# is a small ad-hoc residual for renewals not driven by expiry
# (early renegotiations, account-initiated renewals). Most of the
# Job volume rides on the counterparty.
[job_rates.support-sla-renewal]
rate = 0.5
weekday_multiplier = 1.4
weekend_multiplier = 0.0

# service-agreement — fresh coverage at install. contracts.rs spawns
# one per recently-installed device with tier-weighted probability
# (platinum 0.90, gold 0.70, silver 0.40). Steady-state install
# rate ~17/day × ~0.65 weighted = ~11/day. Sales reps own these.
[job_rates.service-agreement]
rate = 11.0
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.service-agreement.ramp]]
date = "2024-01-02"
rate = 1.0
[[job_rates.service-agreement.ramp]]
date = "2024-07-01"
rate = 4.0
[[job_rates.service-agreement.ramp]]
date = "2025-01-01"
rate = 8.0
[[job_rates.service-agreement.ramp]]
date = "2025-07-01"
rate = 11.0

# decommission — end-of-life retirement. decommission.rs uses
# eligible_count × decommission_rate (0.0003); 1000-day age
# threshold means the rate stays at 0 until ~year 3 of the sim,
# then ramps as the installed-base ages. Conservative 1-2/day at
# steady state.
[job_rates.decommission]
rate = 1.5
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.decommission.ramp]]
date = "2024-01-02"
rate = 0.0  # nothing eligible at launch
[[job_rates.decommission.ramp]]
date = "2026-10-01"
rate = 0.5  # first units cross the 1000-day threshold
[[job_rates.decommission.ramp]]
date = "2027-04-01"
rate = 1.5

# training-session — on-site operator training spawned per install.
# training.rs creates one per device installed. At steady state
# ~17/day installs × 0.5 (only ~half of installs trigger training,
# since RMA replacements + repeat-customer adds skip it) = ~8/day.
# Service techs run these Mon-Fri.
[job_rates.training-session]
rate = 8.0
weekday_multiplier = 1.4
weekend_multiplier = 0.0
[[job_rates.training-session.ramp]]
date = "2024-01-02"
rate = 1.0
[[job_rates.training-session.ramp]]
date = "2024-07-01"
rate = 3.0
[[job_rates.training-session.ramp]]
date = "2025-01-01"
rate = 5.5
[[job_rates.training-session.ramp]]
date = "2025-07-01"
rate = 8.0

# ---------------------------------------------------------------------------
# Subject birth rates — how often new instances of each Subject
# appear, independent of any Job creating them.
# ---------------------------------------------------------------------------

# Account births — new customer accounts onboard at this rate.
# Legacy SimConfig.account_count = 2500 was a one-shot pre-seed; the
# shape-driven engine grows the pool gradually. The rate here is
# tuned so the population reaches ~2500 by late 2025. Boost ramps
# at the same dates as device-intake — sales motion drives both.
[subject_rates.account]
rate = 1.5
created_event_kind = "accounts.account.created"
[[subject_rates.account.ramp]]
date = "2024-01-02"
rate = 1.5
[[subject_rates.account.ramp]]
date = "2024-07-01"
rate = 3.0
[[subject_rates.account.ramp]]
date = "2025-01-01"
rate = 5.0
[[subject_rates.account.ramp]]
date = "2025-07-01"
rate = 7.0

# System births — physical units arriving at the warehouse. Mirrors
# the device-intake rate; each intake event corresponds to one new
# system Subject. Audit_log topic links the synthesized system id
# back to the intake Job.
[subject_rates.asset]
rate = 20.0
created_event_kind = "asset.received"
[[subject_rates.asset.ramp]]
date = "2024-01-02"
rate = 20.0
[[subject_rates.asset.ramp]]
date = "2024-07-01"
rate = 35.0
[[subject_rates.asset.ramp]]
date = "2025-01-01"
rate = 60.0
[[subject_rates.asset.ramp]]
date = "2025-07-01"
rate = 90.0

# Vendor births — sources of intake (trade-in resellers, lease
# returns, OEM channel partners). Slow growth.
[subject_rates.vendor]
rate = 0.05
created_event_kind = "inventory.vendor.created"

# Employees come from examples/used-device-shop/data/employees.json
# at boot — the shape-driven engine doesn't synthesize new ones
# during the sim. brewery-hire / brewery-terminate have no
# used-device-shop equivalent yet (HR JobKinds for this tenant
# would be `hire` / `offboarding` from seed_kinds.rs once they
# move into this file).
[subject_rates.employee]
rate = 0.0

# Campaigns — marketing motions land via the marketing-motion
# JobKind in seed_kinds.rs (not yet in this file).
[subject_rates.campaign]
rate = 0.05
created_event_kind = "commerce.campaign.created"

# ---------------------------------------------------------------------------
# Anomaly probabilities — likelihood that a Step on a given JobKind
# experiences a given anomaly during execution. Mirrors the
# probabilities the legacy generators encoded inline.
# ---------------------------------------------------------------------------

# refurb-used — parts_block_probability from SimConfig (0.08) +
# QA reject rate (~5% of units fail first inspection).
[anomalies.refurb-used]
parts_block_probability = 0.08
qa_reject_probability = 0.05

# field-service — service tech can hit a parts-not-on-truck stall
# (~15%) or a customer-not-available reschedule (~10%).
[anomalies.field-service]
parts_block_probability = 0.15
customer_unavailable_probability = 0.10

# sale — deals get stuck in legal review (~8%) or lost to
# competitive bid (~12%, modeled as cancel).
[anomalies.sale]
legal_review_probability = 0.08
cancel_probability = 0.12

# support-incident — case escalates to engineering (~10%) when
# the first specialist can't resolve.
[anomalies.support-incident]
escalation_probability = 0.10

# support-rma — returned unit fails inbound inspection (~15%) and
# triggers a supplemental customer-charge dispute.
[anomalies.support-rma]
inspection_fail_probability = 0.15

# service-agreement — customer requests scope changes (~20%) before
# signing, requiring a quote revision.
[anomalies.service-agreement]
scope_revision_probability = 0.20

# device-intake — wrong unit shipped or condition way off-grade (~3%).
[anomalies.device-intake]
mismatch_probability = 0.03

# ---------------------------------------------------------------------------
# Random shocks — quarterly probabilistic events that bump a
# JobKind's rate (or one Subject's draws) for a fixed window.
# ---------------------------------------------------------------------------

# Spare-parts shortage — refurb floor stalls when key parts dry up.
# ~8%/qtr ≈ once a year on average.
[[shock]]
name = "parts-shortage"
probability_per_quarter = 0.08
rate_multiplier = 0.6
duration_weeks = 4
target = { kind = "refurb-used" }

# Failure surge — an OEM firmware bug or environmental trigger
# (heat wave, voltage event) bumps service tickets across the fleet
# for a few weeks. ~6%/qtr.
[[shock]]
name = "failure-surge"
probability_per_quarter = 0.06
rate_multiplier = 1.8
duration_weeks = 3
target = { kind = "field-service" }

# Bulk buyer surge — one account places a 10x sale order. The
# engine picks an account at activation and locks it in for the
# window. ~10%/qtr ≈ twice a year.
[[shock]]
name = "bulk-buyer"
probability_per_quarter = 0.10
rate_multiplier = 5.0
duration_weeks = 2
target = { kind = "sale" }

# ---------------------------------------------------------------------------
# Counterparties — external actors that listen to Boss events and
# emit deferred responses.
# ---------------------------------------------------------------------------

# Bank ACH — payment settlement after invoice paid. Same shape as
# the brewery's bank-ach: 1 business day delay, 98.5% success.
[counterparty.bank-ach]
listens_to = "commerce.invoice.paid"
emits = "ledger.payment_settled"
emit_probability = 0.985

  [counterparty.bank-ach.delay]
  mean_days = 1.0
  spread_days = 0.5
  business_calendar = "us-banking"

  [counterparty.bank-ach.payload]
  channel = "ach"
  bank = "chase"

# A/R aging — every billing step.done schedules either a paid or
# past-due emit ~30 business days later. Same shape as brewery.
[counterparty.ar-aging]
listens_to = "step.done.billing"
emits = "commerce.invoice.paid"
emit_else = "commerce.invoice.past_due"
emit_probability = 0.85

  [counterparty.ar-aging.delay]
  mean_days = 30.0
  spread_days = 7.0
  business_calendar = "us-banking"

# Outbound shipping courier — sale + service-agreement Jobs ship
# to customer sites. Three-stage scan chain with ~2% loss rate.
# Listens to the per-step-kind shipment topic the shape-driven
# engine emits when the sale's tier-3 shipment step transitions to
# done. Brewery's keg-courier is the parallel here.
[counterparty.outbound-courier]
listens_to = "step.done.shipment"
emits = "delivery.tracking"
emit_probability = 0.98
match_payload = { "metadata.direction" = "outbound" }

  [counterparty.outbound-courier.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.outbound-courier.payload]
  carrier = "ups-ground"

  [[counterparty.outbound-courier.scans]]
  status = "in-transit"
  delay = { mean_days = 1.0, spread_days = 0.5 }

  [[counterparty.outbound-courier.scans]]
  status = "out-for-delivery"
  delay = { mean_days = 1.5, spread_days = 0.5 }

  [[counterparty.outbound-courier.scans]]
  status = "delivered"
  delay = { mean_days = 0.5, spread_days = 0.25 }

# RMA inbound courier — when a support-rma Job's tier-2 inbound
# shipment step lands, simulate the customer's pickup → in-transit →
# arrival sequence. ~95% success (occasional lost return).
[counterparty.rma-inbound-courier]
listens_to = "step.done.shipment"
emits = "delivery.tracking"
emit_probability = 0.95
match_payload = { "metadata.direction" = "inbound" }

  [counterparty.rma-inbound-courier.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.rma-inbound-courier.payload]
  carrier = "ups-ground"
  flow = "rma-inbound"

  [[counterparty.rma-inbound-courier.scans]]
  status = "label-printed"
  delay = { mean_days = 0.5, spread_days = 0.25 }

  [[counterparty.rma-inbound-courier.scans]]
  status = "in-transit"
  delay = { mean_days = 2.0, spread_days = 1.0 }

  [[counterparty.rma-inbound-courier.scans]]
  status = "arrived-at-warehouse"
  delay = { mean_days = 1.0, spread_days = 0.5 }

# Spare-parts supplier — PO chain for refurb spares. service.rs +
# refurb.rs both burn through `parts_consumed`; the procurement
# step that replenishes them feeds this counterparty. Two-hop:
# vendor invoice arrives ~3 days after PO, AP cut ~5 days after
# invoice match. Mirror of brewery's grain-supplier shape.
[counterparty.spares-supplier]
listens_to = "step.done.procurement"
emits = "inventory.vendor_invoice_received"
emit_probability = 1.0

  [counterparty.spares-supplier.delay]
  mean_days = 3.0
  spread_days = 1.5
  business_calendar = "us-banking"

  [counterparty.spares-supplier.payload]
  vendor = "spares-distributor"

  [[counterparty.spares-supplier.followups]]
  name = "spares-ap-pay"
  listens_to = "inventory.vendor_invoice_received"
  emits = "ap.payment_acknowledged"
  emit_probability = 0.97

    [counterparty.spares-supplier.followups.delay]
    mean_days = 5.0
    spread_days = 2.0
    business_calendar = "us-banking"

    [counterparty.spares-supplier.followups.payload]
    method = "ach"

# Tax authority — closes the loop on the tax-filing pipeline.
# Same shape as brewery's tax-authority.
[counterparty.tax-authority]
listens_to = "ledger.tax_filing_filed"
emits = "ledger.tax_filing_acked"
emit_probability = 0.995

  [counterparty.tax-authority.delay]
  mean_days = 1.5
  spread_days = 0.5
  business_calendar = "us-banking"

  [counterparty.tax-authority.payload]
  channel = "electronic"

# Warranty-expiry → renewal nudge. The legacy service.rs's
# `check_warranty_expiry` walks the warranty_expiry_index daily and
# emits `WarrantyExpired` events; this counterparty listens to the
# fleet-side topic and kicks off a `support-sla-renewal` Job for
# the affected account. Most renewals ride this counterparty
# (the ad-hoc rate in [job_rates.support-sla-renewal] is a small
# residual). 60d delay = the SLA-renewal Job opens 60 days *before*
# expiry, matching the milestone tier-0 step's "60-day expiry
# warning" semantic.
[counterparty.warranty-expiry-nudge]
listens_to = "asset.warranty_expired"
emits = "jobs.support-sla-renewal.opened"
emit_probability = 1.0

  [counterparty.warranty-expiry-nudge.delay]
  mean_days = -60.0  # negative = open ahead of the trigger date
  spread_days = 5.0
  business_calendar = "us-banking"

  [counterparty.warranty-expiry-nudge.payload]
  source = "warranty-expiry-scheduler"

# Operational chatter — one message-broadcast counterparty per
# significant step kind so /inbox lights up with realistic activity.
# Mirrors the brewery's *-broadcast counterparties at the bottom of
# its tenant.toml. CTO is the consistent recipient because
# operational signals route to the COO/CTO operations dashboard.

[counterparty.refurb-handoff-broadcast]
listens_to = "step.done.handoff"
emits = "messages.broadcast"
emit_probability = 0.7

  [counterparty.refurb-handoff-broadcast.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.refurb-handoff-broadcast.payload]
  sender_id = "system-sim"
  recipient_id = "emp-005"
  subject = "Refurb handoff complete"
  body = "Unit moved between refurb stations. Status visible on the floor dashboard."
  kind = "signal"

[counterparty.dispatch-broadcast]
listens_to = "step.done.shipment"
emits = "messages.broadcast"
emit_probability = 0.5

  [counterparty.dispatch-broadcast.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.dispatch-broadcast.payload]
  sender_id = "system-sim"
  recipient_id = "emp-005"
  subject = "Outbound shipment — device shipped"
  body = "Unit left the warehouse. Tracking scans should land within a few business days."
  kind = "signal"

[counterparty.billing-broadcast]
listens_to = "step.done.billing"
emits = "messages.broadcast"
emit_probability = 0.4

  [counterparty.billing-broadcast.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.billing-broadcast.payload]
  sender_id = "system-sim"
  recipient_id = "emp-005"
  subject = "Invoice issued"
  body = "Customer invoice issued. A/R aging counterparty will fire payment ack ~30 days out."
  kind = "signal"

[counterparty.qa-signoff-broadcast]
listens_to = "step.done.sign-off"
emits = "messages.broadcast"
emit_probability = 0.6

  [counterparty.qa-signoff-broadcast.delay]
  mean_days = 0.0
  spread_days = 0.0

  [counterparty.qa-signoff-broadcast.payload]
  sender_id = "system-sim"
  recipient_id = "emp-005"
  subject = "QA sign-off complete"
  body = "Unit cleared QA and is ready for sale. Available stock count incremented."
  kind = "signal"

# ---------------------------------------------------------------------------
# Periodic — calendar-driven cycles independent of any Boss event.
# Same shape as brewery: daily bank sweep + quarterly sales-tax open.
# ---------------------------------------------------------------------------

[periodic.daily-bank-sweep]
cadence = "daily"
anchor_date = "2024-01-02"
business_calendar = "us-banking"
action.kind = "emit_event"
action.topic = "ledger.bank_sweep_request"

[periodic.quarterly-sales-tax]
cadence = "quarterly"
anchor_date = "2024-01-31"
business_calendar = "us-tax"
action.kind = "open_job"
action.job_kind = "sales-tax-filing"
# sales-tax-filing is a brewery-side JobKind in
# examples/brewery/seeds/job_kinds.toml + seed_kinds.rs; the
# used-device-shop tenant reuses it via the platform registry. Step
# 9 of the retirement decides whether to lift it into both tenants'
# files or leave it platform-shared.

# ---------------------------------------------------------------------------
# Batch — population aggregations. Same shape as brewery: payroll,
# sales-tax fanout, payroll-941, income-tax. Tenants share these
# because every business runs payroll + taxes.
# ---------------------------------------------------------------------------

[batch.payroll]
cadence = "biweekly"
anchor_date = "2024-01-04"
business_calendar = "us-banking"
mode = "cron"
emit_topic = "payroll.run_completed"

  [batch.payroll.population]
  kind = "employees"

  [batch.payroll.rule]
  kind = "payroll"
  periods_per_year = 26
  withholding_bps = 2200
  employer_cost_bps = 1500
  provider = "in-house"

[batch.sales-tax]
cadence = "monthly"
anchor_date = "2024-01-20"
business_calendar = "us-banking"
mode = "fanout"
emit_topic = "ledger.tax_filing_filed"

  [batch.sales-tax.population]
  kind = "sales_tax_accruals"

  [batch.sales-tax.rule]
  kind = "sales_tax_filing"

[batch.payroll-941]
cadence = "quarterly"
anchor_date = "2024-01-15"
business_calendar = "us-banking"
mode = "fanout"
emit_topic = "ledger.tax_filing_filed"

  [batch.payroll-941.population]
  kind = "payroll_tax_accruals"

  [batch.payroll-941.rule]
  kind = "payroll_941_filing"

[batch.income-tax]
cadence = "quarterly"
anchor_date = "2024-01-15"
business_calendar = "us-banking"
mode = "fanout"
emit_topic = "ledger.tax_filing_filed"

  [batch.income-tax.population]
  kind = "revenue_periods"

  [batch.income-tax.rule]
  kind = "income_tax_filing"
  estimated_net_margin_bps = 1200
  income_tax_rate_bps = 2700
