# ------------------------------------------------------------------
# Step sign-off authority (step-signoff:<role>).
#
# A sign-off step's required role (`authority_role`) is enforced
# through policy by authorizing against a role-scoped resource —
# `step-signoff:<role>` — rather than a bare `step` (see
# `boss-jobs::http::update_step`). Each role here is granted SignOff
# only on ITS OWN `step-signoff:<role>` resource, so a caller can
# sign a step iff their role matches the step's required authority.
# The required role is read from the step's immutable persisted
# metadata, so a PUT body cannot lower the bar.
#
# One grant per distinct `authority_role` used by the
# used-device-shop's JobKinds
# (examples/used-device-shop/seeds/job_kinds.toml). Without these,
# every sign-off step becomes unsignable. Scope is `all`: the role
# match (the resource match) IS the authority gate; row-level scope
# is not layered on top of the sign-off authority check.
#
# `account-contact` is the customer-side authority on "Customer
# sign-off" steps; the StepSpec `authority_role` field
# (`service-mgr`) shadows the `account-contact` metadata default in
# materialization, so in practice those steps gate on `service-mgr`.
# The grant is kept for completeness so any step that does persist
# `authority_role = "account-contact"` stays signable by that role.
#
# The simulator does not appear here: it drives sign-offs as the
# trusted, `_simulated`-marked actor and is authorized by the
# sim-origin policy bypass (see SimBypassPolicyClient), not by any
# seeded grant. Real employees sign their own steps via the per-role
# grants below.

[[grants]]
role = "service-mgr"
resource = "step-signoff:service-mgr"
action = "sign-off"
scope = "all"

[[grants]]
role = "service-tech"
resource = "step-signoff:service-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "refurb-supervisor"
resource = "step-signoff:refurb-supervisor"
action = "sign-off"
scope = "all"

[[grants]]
role = "refurb-tech"
resource = "step-signoff:refurb-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "qa-lead"
resource = "step-signoff:qa-lead"
action = "sign-off"
scope = "all"

[[grants]]
role = "qa-tech"
resource = "step-signoff:qa-tech"
action = "sign-off"
scope = "all"

[[grants]]
role = "warehouse-mgr"
resource = "step-signoff:warehouse-mgr"
action = "sign-off"
scope = "all"

[[grants]]
role = "warehouse-clerk"
resource = "step-signoff:warehouse-clerk"
action = "sign-off"
scope = "all"

[[grants]]
role = "parts-buyer"
resource = "step-signoff:parts-buyer"
action = "sign-off"
scope = "all"

[[grants]]
role = "sales-mgr"
resource = "step-signoff:sales-mgr"
action = "sign-off"
scope = "all"

[[grants]]
role = "sales-rep"
resource = "step-signoff:sales-rep"
action = "sign-off"
scope = "all"

[[grants]]
role = "controller"
resource = "step-signoff:controller"
action = "sign-off"
scope = "all"

[[grants]]
role = "hr-generalist"
resource = "step-signoff:hr-generalist"
action = "sign-off"
scope = "all"

[[grants]]
role = "recruiter"
resource = "step-signoff:recruiter"
action = "sign-off"
scope = "all"

[[grants]]
role = "it-manager"
resource = "step-signoff:it-manager"
action = "sign-off"
scope = "all"

[[grants]]
