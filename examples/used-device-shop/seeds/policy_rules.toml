# Used-device-shop — tenant policy seed.
#
# The row-level access matrix for the used-device-shop's org
# chart. Tenant policy data lives here, in the tenant's seed
# bundle, not in boss-policy core. Seeded at first boot by:
#
#   boss-policy-bootstrap --seeds examples/used-device-shop/seeds/policy_rules.toml
#
# Re-runs are no-ops unless `--force` is passed.
#
# Scope vocabulary (from `crate::types::Scope`):
#   - "all"                     no restriction
#   - "self"                    rows the caller owns directly
#   - "team"                    caller + their direct reports
#   - "territory"               accounts on the caller's account team
#   - "department:<name>"       rows scoped to a named department
#
# Department names match the used-device-shop's classes.toml:
# sales / service / refurb / qa / warehouse / finance / hr /
# support / it / marketing / executive.

# ------------------------------------------------------------------
# Executives — broad Read across every resource.
# ------------------------------------------------------------------

[[grants]]
roles = ["ceo", "coo", "cfo", "cto"]
resources = [
    "job", "step", "account", "employee", "invoice", "agreement",
    "asset", "shipment", "part", "purchase-order", "policy-rule",
    "job-kind", "step-plugin",
]
action = "read"
scope = "all"

# CEO + COO can tune policy.
[[grants]]
roles = ["ceo", "coo"]
resource = "policy-rule"
actions = ["create", "update", "delete"]
scope = "all"

# CEO + COO + CTO get override authority on Jobs + Steps.
[[grants]]
roles = ["ceo", "coo", "cto"]
resources = ["job"]
actions = ["update", "close"]
scope = "all"

[[grants]]
roles = ["ceo", "coo", "cto"]
resources = ["step"]
actions = ["update", "sign-off"]
scope = "all"

# CEO + COO + CFO can create + update accounts / invoices / agreements.
# (CFO who creates the invoice is NOT the one who signs it off —
# the four-eyes rule is enforced at the JobKind sign-off step.)
[[grants]]
roles = ["ceo", "coo", "cfo"]
resources = ["account", "invoice", "agreement"]
actions = ["create", "update"]
scope = "all"

# CEO + COO can onboard + restructure employees. No delete —
# terminations flip status, never remove rows.
[[grants]]
roles = ["ceo", "coo"]
resource = "employee"
actions = ["create", "update"]
scope = "all"

# Asset reassignment authority for execs.
[[grants]]
roles = ["ceo", "coo", "cto"]
resource = "asset"
action = "update"
scope = "all"

# CEO + CTO can author + publish + retire JobKinds and StepPlugins.
[[grants]]
roles = ["ceo", "cto"]
resources = ["job-kind", "step-plugin"]
actions = ["create", "update", "publish", "retire"]
scope = "all"

