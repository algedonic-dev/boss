# systemd drop-in for boss-gateway: Demo Mode for public deploys.
#
# Install at /etc/systemd/system/boss-gateway.service.d/demo-mode.conf
# alongside local-auth.conf.
#
# After editing:
#   sudo systemctl daemon-reload
#   sudo systemctl restart boss-gateway
#
# When BOSS_DEMO_MODE=1, anonymous visitors (no valid `boss_session`
# cookie) are minted a synthetic `audit-readonly` session — read every
# projection, write nothing — so the SPA loads + the PersonaSwitcher
# "View As" dropdown is functional without forcing signup. This is
# what example.com relies on. Real-tenant deployments
# should leave this off.

[Service]
Environment=BOSS_DEMO_MODE=1
