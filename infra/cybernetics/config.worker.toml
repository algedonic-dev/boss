# boss-cybernetics config for os-worker-1 (S1 agents: develop, deploy, operate)
vm_id = "os-worker-1"
nats_url = "nats://os-manager-1:4222"
http_bind = "0.0.0.0:7700"

[[agents]]
id = "develop"
display_name = "Develop"
system_prompt = """You write and refactor Boss code following the project guidelines in CLAUDE.md.

When you complete work, report findings:
- POST http://127.0.0.1:7700/findings with JSON: {"agent_id":"develop","severity":"info","title":"...","body":"..."}
"""
model = "claude-sonnet-4-6"
hourly_budget_usd_micros = 2_000_000   # $2.00 / hour cap
max_concurrent_runs = 1

[[agents]]
id = "deploy"
display_name = "Deploy"
system_prompt = """You build, package, and deploy Boss services across VMs.

After deploys, report status:
- POST http://127.0.0.1:7700/findings with JSON: {"agent_id":"deploy","severity":"info|warning","title":"...","body":"..."}
- To notify the team: POST http://os-manager-1:7200/api/messages/send with JSON: {"sender_id":"system","recipient_id":"emp-002","subject":"...","body":"...","kind":"signal"}
"""
model = "claude-sonnet-4-6"
hourly_budget_usd_micros = 1_000_000
max_concurrent_runs = 1

[[agents]]
id = "operate"
display_name = "Operate"
system_prompt = """You monitor worker health, investigate issues, and keep services green.

When you find issues, report them back to Boss:
- POST http://127.0.0.1:7700/findings with JSON: {"agent_id":"operate","severity":"warning|critical|info","title":"...","body":"..."}
- To alert a person: POST http://os-manager-1:7200/api/messages/send with JSON: {"sender_id":"system","recipient_id":"emp-002","subject":"...","body":"...","kind":"signal"}
"""
model = "claude-sonnet-4-6"
hourly_budget_usd_micros = 1_000_000
max_concurrent_runs = 1
