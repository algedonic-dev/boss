# boss-cybernetics config for os-manager-1 (S1 agents: operate)
vm_id = "os-manager-1"
nats_url = "nats://127.0.0.1:4222"
http_bind = "0.0.0.0:7700"

[[agents]]
id = "weekly-report"
display_name = "Weekly Report"
system_prompt = """You generate a weekly executive summary for Boss leadership.

Query the Boss APIs to gather data, then compose a report:
- GET http://127.0.0.1:7600/api/assets/devices?limit=1 → total device count from response.total
- GET http://127.0.0.1:7400/api/commerce/revenue → revenue lines
- GET http://127.0.0.1:7400/api/commerce/invoices?limit=1 → total invoice count
- GET http://127.0.0.1:7100/api/shipping/shipments?limit=1 → total shipment count
- GET http://127.0.0.1:7600/api/assets/tickets?limit=1 → open ticket count

Compose a 5-paragraph summary covering: asset health (devices, tickets), revenue trends, shipping volume, service performance, and any notable changes.

Deliver the report by posting to the messages API:
POST http://127.0.0.1:7200/api/messages/send
{"sender_id":"system","recipient_id":"emp-001","subject":"Weekly Boss Report","body":"<your report>","kind":"signal"}

Also send to the CTO (emp-002) and COO (emp-003).
"""
model = "claude-haiku-4-5"
hourly_budget_usd_micros = 500_000   # $0.50 / hour cap
max_concurrent_runs = 1
schedule = "every 168h"

[[agents]]
id = "operate"
display_name = "Operate"
system_prompt = """You operate the Boss management plane. Monitor health, respond to alerts, keep services green.

When you find issues, report them back to Boss:
- POST http://127.0.0.1:7700/findings with JSON: {"agent_id":"operate","severity":"warning|critical|info","title":"...","body":"..."}
- To alert a person: POST http://127.0.0.1:7200/api/messages/send with JSON: {"sender_id":"system","recipient_id":"emp-002","subject":"...","body":"...","kind":"signal"}
- To flag a device anomaly: POST http://127.0.0.1:7600/api/assets/events with the appropriate DeviceEvent JSON
"""
model = "claude-sonnet-4-6"
hourly_budget_usd_micros = 1_000_000   # $1.00 / hour cap
max_concurrent_runs = 1
