name: Release

# Tagged releases (v*) build cross-platform `boss` CLI binaries +
# emit SLSA Build Level 3 provenance attestations via GitHub's
# native `actions/attest-build-provenance` action.
#
# Verify a download:
#
#   gh attestation verify <binary> \
#     --repo algedonic-dev/boss
#
# The attestation ties each artifact's SHA256 to (a) the GitHub
# Actions runner that built it, (b) the source commit, (c) the
# builder identity. Sigstore handles signing keylessly via
# GitHub's OIDC token — no maintainer key to manage or rotate.
#
# Previous incarnation used the slsa-framework reusable workflow
# (`generator_generic_slsa3.yml@v2.1.0`). That workflow's
# `provenance/final` step exited 27 with no diagnostic on v1.0.0
# (known issue: slsa-framework/slsa-github-generator#3031 +
# #4000). Switched to the GitHub-native action which is simpler
# and maintained alongside the runner.

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: boss-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: boss-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: boss-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: boss-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --package boss-cli

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/boss ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write      # publish the release + upload assets
      id-token: write      # keyless Sigstore signing of the attestation
      attestations: write  # write the attestation to GitHub's storage
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        # download-artifact creates one subdir per artifact
        # (`artifacts/boss-linux-amd64/boss-linux-amd64`); flatten
        # so the attest action + gh release upload both see the
        # binaries at top level.
        run: |
          set -euo pipefail
          mkdir -p dist
          for d in artifacts/boss-*; do
            cp "$d/$(basename "$d")" "dist/$(basename "$d")"
          done
          chmod +x dist/boss-*
          ls -la dist/

      - name: Generate SLSA build provenance attestation
        # GitHub's attestation API is only available for public repos
        # (and org-owned repos with Enterprise). On user-owned private
        # repos this step fails with "Feature not available for
        # user-owned private repositories." Marking continue-on-error
        # so private-origin releases (algedonic-dev/boss) still publish their
        # binaries; the public algedonic-dev/boss will pick up the
        # attestation cleanly when this same workflow runs there.
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/boss-linux-amd64
            dist/boss-linux-arm64
            dist/boss-darwin-amd64
            dist/boss-darwin-arm64

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          # Build release notes in a temp file so the multi-line
          # markdown (with backticks) doesn't fight YAML escaping.
          cat > /tmp/release-notes.md <<NOTES
          Cross-platform \`boss\` CLI binaries with SLSA Build Level 3
          provenance, signed via Sigstore keyless OIDC.

          To verify a download:

          \`\`\`sh
          gh attestation verify <binary> --repo ${REPO}
          \`\`\`

          The attestation lives in GitHub's attestation storage (queryable
          via \`gh attestation list --repo ${REPO}\`); it ties each
          artifact's SHA256 to this commit + the GitHub Actions runner
          that built it.
          NOTES
          gh release create "$tag" \
            --title "BOSS $tag" \
            --notes-file /tmp/release-notes.md \
            dist/boss-linux-amd64 \
            dist/boss-linux-arm64 \
            dist/boss-darwin-amd64 \
            dist/boss-darwin-arm64
