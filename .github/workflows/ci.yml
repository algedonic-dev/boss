name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: boss
          POSTGRES_PASSWORD: boss
          POSTGRES_DB: boss
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 (pinned per OpenSSF Scorecard)

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Apply schema
        run: infra/postgres/apply-schema.sh | psql -h localhost -U boss -d boss
        env:
          PGPASSWORD: boss

      - name: Clippy
        # `--workspace` covers every member crate; `--tests` includes
        # the test code (where most non-determinism + dead-code
        # patterns surface). `-D warnings` flips clippy's default
        # warn-level lints into hard errors — this is the gate that
        # prevents the workspace from drifting back above 0 warnings
        # after the 2026-05-05 sweep.
        run: cargo clippy --workspace --all-features --tests -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Format check
        run: cargo fmt -- --check

      - name: Seed bypass-smell lint
        run: infra/lint/seed-bypass-smell.sh

      - name: No-TODO-citation lint
        run: infra/lint/no-todo-citation.sh

      - name: Release scrub (wordlist + binary metadata)
        run: infra/lint/release-scrub.sh

      - name: No step-kind matches in core (ADR-0021)
        run: infra/lint/no-step-kind-match.sh

      - name: API-path bypass-smell (no direct-DB data writes)
        run: infra/lint/api-path-bypass-smell.sh

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4 (pinned per OpenSSF Scorecard)

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck

      - name: Build
        working-directory: apps/web
        run: bun run build
