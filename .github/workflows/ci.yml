name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: CI only reads the repo (checkout + build).
# No job needs write — release/attestation live in release.yml.
permissions:
  contents: read

# Retry transient crates.io download failures (curl / "SSL unexpected eof")
# rather than failing the whole run on an infra flake — these blips have
# red-X'd green code mid-clippy. Applies to every job's cargo invocations.
env:
  CARGO_NET_RETRY: "10"

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      # Trim debuginfo from the dev/test build. The ~60-crate workspace
      # otherwise fills the runner's disk (rustc-LLVM "No space left on
      # device") partway through `cargo test`.
      CARGO_PROFILE_DEV_DEBUG: "0"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: boss
          POSTGRES_PASSWORD: boss
          POSTGRES_DB: boss
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Free up runner disk space
        # The default GitHub-hosted runner has ~14 GB free; the large
        # workspace's test build needs more. Reclaim ~25 GB of
        # preinstalled toolchains we don't use before building. Inline
        # rm (not a third-party action) to keep every action SHA-pinned
        # per OpenSSF Scorecard.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Apply schema
        run: infra/postgres/apply-schema.sh | psql -h localhost -U boss -d boss
        env:
          PGPASSWORD: boss

      - name: Clippy
        # `--workspace` covers every member crate; `--tests` includes
        # the test code (where most non-determinism + dead-code
        # patterns surface). `-D warnings` flips clippy's default
        # warn-level lints into hard errors — this is the gate that
        # prevents the workspace from drifting back above 0 warnings
        # after the 2026-05-05 sweep.
        run: cargo clippy --workspace --all-features --tests -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Format check
        run: cargo fmt -- --check

      - name: Seed bypass-smell lint
        run: infra/lint/seed-bypass-smell.sh

      - name: No-TODO-citation lint
        run: infra/lint/no-todo-citation.sh

      - name: No step-kind matches in core (ADR-0021)
        run: infra/lint/no-step-kind-match.sh

      - name: API-path bypass-smell (no direct-DB data writes)
        run: infra/lint/api-path-bypass-smell.sh

      # Linchpin for seed-event realism: the sim may only reach the
      # system through *-client crates (the public API), so event
      # ordering is forced by the live write-time guards. If the sim
      # could bulk-write domain state, ordering realism would be lost.
      - name: Sim-boundary audit (sim goes through the API only)
        run: infra/lint/sim-boundary-audit.sh

      - name: Tier-import audit (Tier-1 must not depend on Tier-2)
        run: infra/lint/tier-import-audit.sh

      # Temporal realism: every timestamp routes through clock-api, so
      # sim-epoch events aren't stamped with wallclock.
      - name: No-wallclock (timestamps route through clock-api)
        run: infra/lint/no-wallclock.sh

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck

      - name: Build
        working-directory: apps/web
        run: bun run build

      # Mocked-backend Playwright smoke — guards the SPA's interactive
      # behavior (the JobKind authoring graph/inspector/workflow rail,
      # routing) against regression. Every /api call is intercepted
      # in-browser, so no backend is needed; the live-stack suite is the
      # separate Phase-2 gate. See apps/web/playwright.mocked.config.ts.
      - name: Install Playwright browser
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Frontend smoke (mocked backend)
        working-directory: apps/web
        run: bun run test:mocked
