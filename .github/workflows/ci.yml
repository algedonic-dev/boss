name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      # Trim debuginfo from the dev/test build. The ~60-crate workspace
      # otherwise fills the runner's disk (rustc-LLVM "No space left on
      # device") partway through `cargo test`.
      CARGO_PROFILE_DEV_DEBUG: "0"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: boss
          POSTGRES_PASSWORD: boss
          POSTGRES_DB: boss
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Free up runner disk space
        # The default GitHub-hosted runner has ~14 GB free; the large
        # workspace's test build needs more. Reclaim ~25 GB of
        # preinstalled toolchains we don't use before building. Inline
        # rm (not a third-party action) to keep every action SHA-pinned
        # per OpenSSF Scorecard.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Apply schema
        run: infra/postgres/apply-schema.sh | psql -h localhost -U boss -d boss
        env:
          PGPASSWORD: boss

      - name: Clippy
        # `--workspace` covers every member crate; `--tests` includes
        # the test code (where most non-determinism + dead-code
        # patterns surface). `-D warnings` flips clippy's default
        # warn-level lints into hard errors — this is the gate that
        # prevents the workspace from drifting back above 0 warnings
        # after the 2026-05-05 sweep.
        run: cargo clippy --workspace --all-features --tests -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Format check
        run: cargo fmt -- --check

      - name: Seed bypass-smell lint
        run: infra/lint/seed-bypass-smell.sh

      - name: No-TODO-citation lint
        run: infra/lint/no-todo-citation.sh

      - name: No step-kind matches in core (ADR-0021)
        run: infra/lint/no-step-kind-match.sh

      - name: API-path bypass-smell (no direct-DB data writes)
        run: infra/lint/api-path-bypass-smell.sh

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (pinned per OpenSSF Scorecard)

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        working-directory: apps/web
        run: bun install

      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck

      - name: Build
        working-directory: apps/web
        run: bun run build
