# CodeQL — static application security testing (SAST).
#
# Scorecard's SAST check only credits a recognized SAST engine (CodeQL,
# Sonar, Snyk, …); clippy/svelte-check don't count, which is why the
# check scored 0 despite our lint gates. This workflow runs CodeQL over
# both halves of the tree:
#   - javascript-typescript — apps/web (Svelte 5 SPA)
#   - rust                  — the crates/ workspace
#
# Both languages use build-mode: none — CodeQL builds its database from
# source without compiling, so this stays fast and never has to
# reproduce the workspace build. Actions are pinned to a SHA (matching
# scorecard.yml) so this doesn't reopen a Pinned-Dependencies alert.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"  # Mondays 05:23 UTC

permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload CodeQL SARIF to the Security tab
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
