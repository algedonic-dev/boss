# Dependabot configuration. Required by OpenSSF Scorecard's
# "Dependency-Update-Tool" check. Also genuinely useful — supply-
# chain freshness is the cheap half of the security story.
#
# Three ecosystems active in this repo:
#   - cargo:           the Rust workspace at /
#   - bun (npm):       the Svelte SPA at /apps/web
#   - github-actions:  the workflows under .github/workflows
#
# Cadence: weekly on Monday so a contributor who's offline over a
# weekend doesn't return to a wall of PRs. Group all minor + patch
# updates per ecosystem into a single PR; major updates land
# separately so they get individual review.

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns:
          - "*"
